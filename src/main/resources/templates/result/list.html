<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩列表 - 体育赛事管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="~{fragments/navbar :: navbar(true)}"></div>

    <div class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <span sec:authorize="hasAnyRole('ADMIN', 'REFEREE')">成绩管理</span>
                <span sec:authorize="hasAnyRole('ATHLETE', 'SPECTATOR') and not hasAnyRole('ADMIN', 'REFEREE')">成绩列表</span>
            </h2>
            <!-- 录入按钮 - 仅管理员和裁判可见 -->
            <a sec:authorize="hasAnyRole('ADMIN', 'REFEREE')" th:href="@{/results/record}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i>录入成绩
            </a>
        </div>

        <!-- 成功/错误消息 -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-circle me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- 权限提示 - 观众和运动员可见 -->
        <div sec:authorize="hasAnyRole('ATHLETE', 'SPECTATOR') and not hasAnyRole('ADMIN', 'REFEREE')" class="alert alert-info">
            <i class="bi bi-info-circle me-2"></i>
            您当前仅有查看权限，如需管理成绩请联系管理员。
        </div>
        
        <!-- 成绩列表 -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>运动员</th>
                                <th>比赛项目</th>
                                <th>成绩</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="result, stat : ${results}">
                                <td th:text="${stat.count}">1</td>
                                <td>
                                    <a th:href="@{/athletes/{id}(id=${result.athlete.id})}" 
                                       th:text="${result.athlete.name}">运动员</a>
                                </td>
                                <td th:text="${result.sportType != null} ? ${result.sportType.name} : '-'">项目</td>
                                <td>
                                    <strong th:text="${result.scoreText}">成绩</strong>
                                </td>
                                <td>
                                    <span th:if="${result.status == 'VALID'}" class="badge bg-success">有效</span>
                                    <span th:if="${result.status == 'INVALID'}" class="badge bg-danger">无效</span>
                                    <span th:if="${result.status == 'DNS'}" class="badge bg-secondary">弃权</span>
                                    <span th:if="${result.status == 'DNF'}" class="badge bg-warning">未完成</span>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <!-- 查看按钮 - 所有用户可见 -->
                                        <a th:href="@{/results/{id}(id=${result.id})}" 
                                           class="btn btn-outline-info" title="详情">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <!-- 编辑按钮 - 仅管理员和裁判可见 -->
                                        <a sec:authorize="hasAnyRole('ADMIN', 'REFEREE')" 
                                           th:href="@{/results/{id}/edit(id=${result.id})}" 
                                           class="btn btn-outline-primary" title="编辑">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${results == null or #lists.isEmpty(results)}">
                                <td colspan="6" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                                    <p class="mt-2">暂无成绩数据</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
