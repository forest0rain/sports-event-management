<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}"
      lang="zh-CN">
<head>
    <title>成绩录入 - 体育赛事管理平台</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="${result != null && result.id != null} ? '编辑成绩' : '录入成绩'">录入成绩</h2>
        <a th:href="@{/results}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>返回列表
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="${result != null && result.id != null} ? @{/results/{id}/edit(id=${result.id})} : @{/results/record}" 
                  method="post">
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">赛程ID <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" name="scheduleId" 
                               th:value="${result != null} ? ${result.schedule.id} : ${scheduleId}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">运动员ID <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" name="athleteId" 
                               th:value="${result != null} ? ${result.athlete.id} : ''" required>
                    </div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">成绩数值 <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" name="score" step="0.001"
                               th:value="${result != null} ? ${result.score} : ''" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">成绩文本 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="scoreText" 
                               th:value="${result != null} ? ${result.scoreText} : ''" 
                               placeholder="如：10.23秒、5.2米" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">状态 <span class="text-danger">*</span></label>
                        <select class="form-select" name="status" required>
                            <option value="VALID" th:selected="${result != null && result.status == 'VALID'}">有效</option>
                            <option value="INVALID" th:selected="${result != null && result.status == 'INVALID'}">无效</option>
                            <option value="DNS" th:selected="${result != null && result.status == 'DNS'}">弃权</option>
                            <option value="DNF" th:selected="${result != null && result.status == 'DNF'}">未完成</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">备注</label>
                    <textarea class="form-control" name="remark" rows="3"
                              th:text="${result != null} ? ${result.remark} : ''"></textarea>
                </div>
                
                <div class="text-end">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>保存
                    </button>
                    <a th:href="@{/results}" class="btn btn-outline-secondary ms-2">取消</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
