<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 体育赛事管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            border: none;
            border-radius: 15px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        .btn-outline-primary {
            color: #667eea;
            border-color: #667eea;
        }
        .btn-outline-primary:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #764ba2;
            color: white;
        }
        .success-animation {
            animation: fadeInUp 0.5s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
            <div class="col-md-5">
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <!-- Logo -->
                        <div class="text-center mb-4">
                            <i class="bi bi-trophy text-primary" style="font-size: 3rem;"></i>
                            <h2 class="mt-2">体育赛事管理平台</h2>
                            <p class="text-muted" th:text="${registerSuccess} ? '注册成功' : '创建您的账户'">创建您的账户</p>
                        </div>
                        
                        <!-- 注册成功提示 -->
                        <div th:if="${registerSuccess}" class="success-animation">
                            <div class="alert alert-success text-center py-4" role="alert">
                                <i class="bi bi-check-circle-fill" style="font-size: 3rem; color: #198754;"></i>
                                <h4 class="mt-3 mb-2" th:text="${successMessage}">恭喜您，账号注册成功！</h4>
                                <p class="mb-3 text-muted">您现在可以使用您的账号登录系统</p>
                            </div>
                            
                            <div class="d-grid gap-2 mt-4">
                                <a th:href="@{/login}" class="btn btn-primary btn-lg">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>立即登录
                                </a>
                                <a th:href="@{/register}" class="btn btn-outline-secondary">
                                    <i class="bi bi-person-plus me-2"></i>继续注册新账号
                                </a>
                            </div>
                            
                            <div class="text-center mt-4">
                                <span class="text-muted">或返回</span>
                                <a th:href="@{/dashboard}" class="text-decoration-none">首页</a>
                            </div>
                        </div>
                        
                        <!-- 错误提示 -->
                        <div th:if="${error}" class="alert alert-danger" role="alert">
                            <i class="bi bi-exclamation-circle me-2"></i>
                            <span th:text="${error}"></span>
                        </div>
                        
                        <!-- 注册表单 -->
                        <form th:unless="${registerSuccess}" th:action="@{/register}" th:object="${user}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">用户名 <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control" id="username" th:field="*{username}" 
                                           placeholder="请输入用户名" required minlength="3" maxlength="20">
                                </div>
                                <div class="form-text">用户名长度3-20个字符</div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="realName" class="form-label">真实姓名 <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                    <input type="text" class="form-control" id="realName" th:field="*{realName}" 
                                           placeholder="请输入真实姓名" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="email" class="form-label">邮箱 <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" th:field="*{email}" 
                                           placeholder="请输入邮箱地址" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">密码 <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control" id="password" th:field="*{password}" 
                                           placeholder="请输入密码" required minlength="6">
                                </div>
                                <div class="form-text">密码长度至少6个字符</div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">确认密码 <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" 
                                           placeholder="请再次输入密码" required>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 mb-3">
                                <i class="bi bi-person-plus me-2"></i>注册
                            </button>
                            
                            <div class="text-center">
                                <span class="text-muted">已有账户？</span>
                                <a th:href="@{/login}" class="text-decoration-none">立即登录</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:unless="${registerSuccess}">
        // 密码确认验证
        document.querySelector('form').addEventListener('submit', function(e) {
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                e.preventDefault();
                alert('两次输入的密码不一致！');
            }
        });
    </script>
</body>
</html>
