<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运动员详情 - 体育赛事管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/dashboard}">
                <i class="bi bi-trophy me-2"></i>体育赛事管理平台
            </a>
            <div class="navbar-nav me-auto">
                <a class="nav-link text-white" th:href="@{/dashboard}">
                    <i class="bi bi-house-door me-1"></i>主页
                </a>
            </div>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text text-white me-3">
                    欢迎，<span sec:authentication="name">用户</span>
                </span>
                <a class="nav-link text-white" th:href="@{/logout}">
                    <i class="bi bi-box-arrow-right me-1"></i>退出
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 th:text="${athlete.name}">运动员详情</h2>
            <div>
                <a th:href="@{/athletes}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>返回列表
                </a>
                <a th:href="@{/athletes/{id}/edit(id=${athlete.id})}" class="btn btn-primary">
                    <i class="bi bi-pencil me-1"></i>编辑
                </a>
            </div>
        </div>

        <!-- 基本信息 -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">基本信息</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <table class="table table-borderless">
                            <tr>
                                <td class="text-muted" width="120">姓名</td>
                                <td th:text="${athlete.name}">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">性别</td>
                                <td th:text="${athlete.gender == 'M'} ? '男' : '女'">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">出生日期</td>
                                <td th:text="${athlete.birthDate != null ? @dateTimeFormatUtil.formatDate(athlete.birthDate) : '-'}">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">年龄组</td>
                                <td th:text="${athlete.ageGroup}">-</td>
                            </tr>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <table class="table table-borderless">
                            <tr>
                                <td class="text-muted" width="120">身份证号</td>
                                <td th:text="${athlete.idCard}">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">联系电话</td>
                                <td th:text="${athlete.phone}">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">所属单位</td>
                                <td th:text="${athlete.organization}">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">状态</td>
                                <td>
                                    <span th:if="${athlete.enabled}" class="badge bg-success">正常</span>
                                    <span th:unless="${athlete.enabled}" class="badge bg-secondary">停用</span>
                                </td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 标签信息 -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">特长与标签</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <strong class="text-muted">特长项目</strong>
                    <div class="mt-2">
                        <span th:each="specialty : ${specialties}" class="badge bg-primary me-1 mb-1" th:text="${specialty}"></span>
                        <span th:if="${specialties == null or specialties.empty}" class="text-muted">暂无</span>
                    </div>
                </div>
                <div>
                    <strong class="text-muted">自定义标签</strong>
                    <div class="mt-2">
                        <span th:each="tag : ${customTags}" class="badge bg-secondary me-1 mb-1" th:text="${tag}"></span>
                        <span th:if="${customTags == null or customTags.empty}" class="text-muted">暂无</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
