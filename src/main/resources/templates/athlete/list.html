<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运动员列表 - 体育赛事管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/dashboard}">
                <i class="bi bi-trophy me-2"></i>体育赛事管理平台
            </a>
            <div class="navbar-nav me-auto">
                <a class="nav-link text-white" th:href="@{/dashboard}">
                    <i class="bi bi-house-door me-1"></i>主页
                </a>
            </div>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text text-white me-3">
                    欢迎，<span sec:authentication="name">用户</span>
                </span>
                <a class="nav-link text-white" th:href="@{/logout}">
                    <i class="bi bi-box-arrow-right me-1"></i>退出
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <span sec:authorize="hasRole('ADMIN')">运动员管理</span>
                <span sec:authorize="not hasRole('ADMIN')">运动员列表</span>
            </h2>
            <!-- 添加按钮 - 仅管理员可见 -->
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/athletes/create}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i>添加运动员
            </a>
        </div>

        <!-- 成功/错误消息 -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-circle me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- 权限提示 - 非管理员可见 -->
        <div sec:authorize="not hasRole('ADMIN')" class="alert alert-info">
            <i class="bi bi-info-circle me-2"></i>
            您当前仅有查看权限，如需管理运动员请联系管理员。
        </div>

        <!-- 搜索和筛选 -->
        <div class="card mb-4">
            <div class="card-body">
                <form method="get" class="row g-3">
                    <div class="col-md-4">
                        <input type="text" class="form-control" name="keyword" 
                               th:value="${keyword}" placeholder="搜索姓名...">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-outline-primary w-100">
                            <i class="bi bi-search me-1"></i>搜索
                        </button>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- 运动员列表 -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>姓名</th>
                                <th>性别</th>
                                <th>出生日期</th>
                                <th>年龄组</th>
                                <th>所属单位</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="athlete : ${athletes}">
                                <td>
                                    <a th:href="@{/athletes/{id}(id=${athlete.id})}" 
                                       th:text="${athlete.name}">姓名</a>
                                </td>
                                <td th:text="${athlete.gender == 'M'} ? '男' : '女'">性别</td>
                                <td th:text="${#temporals.format(athlete.birthDate, 'yyyy-MM-dd')}">出生日期</td>
                                <td th:text="${athlete.ageGroup}">年龄组</td>
                                <td th:text="${athlete.organization}">单位</td>
                                <td>
                                    <span th:if="${athlete.enabled}" class="badge bg-success">正常</span>
                                    <span th:unless="${athlete.enabled}" class="badge bg-secondary">停用</span>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <!-- 查看按钮 - 所有用户可见 -->
                                        <a th:href="@{/athletes/{id}(id=${athlete.id})}" 
                                           class="btn btn-outline-info" title="查看">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <!-- 编辑按钮 - 仅管理员可见 -->
                                        <a sec:authorize="hasRole('ADMIN')" 
                                           th:href="@{/athletes/{id}/edit(id=${athlete.id})}" 
                                           class="btn btn-outline-primary" title="编辑">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${athletes == null or #lists.isEmpty(athletes)}">
                                <td colspan="7" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                                    <p class="mt-2">暂无运动员数据</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
