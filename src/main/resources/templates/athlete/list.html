<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title>运动员管理</title>
</head>
<body>
    <div layout:fragment="page-title">运动员管理</div>

    <div layout:fragment="content">
        <!-- 搜索筛选 -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <form th:action="@{/athletes}" method="get" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">姓名</label>
                        <input type="text" class="form-control" name="name" th:value="${param.name}" placeholder="输入姓名">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">国家/地区</label>
                        <input type="text" class="form-control" name="country" th:value="${param.country}" placeholder="输入国家">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">项目</label>
                        <input type="text" class="form-control" name="sportType" th:value="${param.sportType}" placeholder="输入项目">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-search me-1"></i>搜索
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">共 <span th:text="${athletes.size()}">0</span> 名运动员</h5>
            <a th:href="@{/athletes/new}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>添加运动员
            </a>
        </div>

        <!-- 运动员列表 -->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>姓名</th>
                                <th>性别</th>
                                <th>年龄</th>
                                <th>国家</th>
                                <th>运动项目</th>
                                <th>最好成绩</th>
                                <th class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="athlete : ${athletes}">
                                <td th:text="${athlete.id}">1</td>
                                <td th:text="${athlete.name}">运动员姓名</td>
                                <td th:text="${athlete.gender == 'MALE' ? '男' : '女'}">男</td>
                                <td th:text="${athlete.age}">25</td>
                                <td th:text="${athlete.country}">中国</td>
                                <td th:text="${athlete.sportType}">田径</td>
                                <td th:text="${athlete.bestRecord ?: '-'}">10.5秒</td>
                                <td class="text-center">
                                    <a th:href="@{/athletes/{id}(id=${athlete.id})}" class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/athletes/{id}/edit(id=${athlete.id})}" class="btn btn-sm btn-outline-secondary">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(athletes)}">
                                <td colspan="8" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                                    暂无运动员数据
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
