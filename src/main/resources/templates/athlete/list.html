<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title>运动员管理</title>
</head>
<body>
    <div layout:fragment="page-header">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h4">运动员管理</h1>
        </div>
    </div>

    <div layout:fragment="content">
        <!-- 搜索筛选 -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <form th:action="@{/athletes}" method="get" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">姓名</label>
                        <input type="text" class="form-control" name="name" th:value="${param.name}" placeholder="输入运动员姓名">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">国家</label>
                        <input type="text" class="form-control" name="keyword" th:value="${keyword}" placeholder="输入运动员姓名或单位">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">性别</label>
                        <select class="form-select" name="gender">
                            <option value="">全部</option>
                            <option value="MALE" th:selected="${param.gender == 'MALE'}">男</option>
                            <option value="FEMALE" th:selected="${param.gender == 'FEMALE'}">女</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-search me-1"></i>搜索
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">共 <span th:text="${athletes.totalElements}">0</span> 条记录</h5>
            <a th:href="@{/athletes/new}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>添加运动员
            </a>
        </div>

        <!-- 运动员列表 -->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>姓名</th>
                                <th>性别</th>
                                <th>国家</th>
                                <th>出生日期</th>
                                <th>运动项目</th>
                                <th>最好成绩</th>
                                <th class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="athlete : ${athletes}">
                                <td th:text="${athlete.id}">1</td>
                                <td th:text="${athlete.name}">运动员姓名</td>
                                <td th:text="${athlete.gender == 'M' ? '男' : '女'}">男</td>
                                <td th:text="${athlete.nationality ?: '-'}">中国</td>
                                <td th:text="${athlete.birthDate != null ? #temporals.format(athlete.birthDate, 'yyyy-MM-dd') : '-'}">2000-01-01</td>
                                <td th:text="${athlete.specialties ?: '-'}">田径</td>
                                <td th:text="${athlete.personalBests ?: '-'}">10.5s</td>
                                <td class="text-center">
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/athletes/{id}(id=${athlete.id})}" class="btn btn-outline-primary">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <a th:href="@{/athletes/{id}/edit(id=${athlete.id})}" class="btn btn-outline-secondary">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <form th:action="@{/athletes/{id}/delete(id=${athlete.id})}" method="post" style="display:inline;"
                                              onsubmit="return confirm('确定删除该运动员吗？');">
                                            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                                            <button type="submit" class="btn btn-outline-danger">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${athletes.totalElements == 0}">
                                <td colspan="8" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                                    暂无运动员数据
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
