<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">

<head>
    <title>修改密码 - 体育赛事管理平台</title>
</head>

<body>
<div layout:fragment="content">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-key"></i> 修改密码</h5>
                    </div>
                    <div class="card-body">
                        <!-- 提示信息 -->
                        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <form th:action="@{/admin/users/change-password}" method="post">
                            <div class="mb-3">
                                <label class="form-label">原密码 <span class="text-danger">*</span></label>
                                <input type="password" name="oldPassword" class="form-control" 
                                       required placeholder="请输入原密码">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">新密码 <span class="text-danger">*</span></label>
                                <input type="password" name="newPassword" class="form-control" 
                                       required minlength="6" placeholder="请输入新密码（至少6位）">
                                <div class="form-text">密码长度至少6位</div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">确认新密码 <span class="text-danger">*</span></label>
                                <input type="password" name="confirmPassword" class="form-control" 
                                       required minlength="6" placeholder="请再次输入新密码">
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-circle"></i> 确认修改
                                </button>
                                <a th:href="@{/}" class="btn btn-secondary">
                                    <i class="bi bi-house"></i> 返回首页
                                </a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- 安全提示 -->
                <div class="card mt-4">
                    <div class="card-header">
                        <h6 class="mb-0"><i class="bi bi-shield-check"></i> 安全提示</h6>
                    </div>
                    <div class="card-body">
                        <ul class="mb-0 text-muted small">
                            <li>请勿使用过于简单的密码，如"123456"或生日等</li>
                            <li>建议使用字母、数字和特殊字符的组合</li>
                            <li>新密码长度不能少于6位</li>
                            <li>修改密码后请重新登录</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
