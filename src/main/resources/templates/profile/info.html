<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号设置 - 体育赛事管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- 导航栏 -->
    <div th:replace="~{fragments/navbar :: navbar(false)}"></div>

    <div class="container py-4">
        <div class="row mb-4">
            <div class="col-12">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/dashboard}">首页</a></li>
                        <li class="breadcrumb-item active">账号设置</li>
                    </ol>
                </nav>
            </div>
        </div>

        <!-- 提示消息 -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-circle me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row">
            <!-- 左侧菜单 -->
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-person-circle me-2"></i>个人中心</h5>
                    </div>
                    <div class="list-group list-group-flush">
                        <a th:href="@{/profile/info}" class="list-group-item list-group-item-action active">
                            <i class="bi bi-gear me-2"></i>账号设置
                        </a>
                        <a th:href="@{/profile/role-application}" class="list-group-item list-group-item-action">
                            <i class="bi bi-arrow-up-circle me-2"></i>角色申请
                        </a>
                    </div>
                </div>
            </div>

            <!-- 右侧内容 -->
            <div class="col-md-9">
                <!-- 基本信息 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-person me-2"></i>基本信息</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/profile/info}" method="post" th:object="${user}">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">用户名</label>
                                    <input type="text" class="form-control" th:value="${user.username}" readonly disabled>
                                    <small class="text-muted">用户名不可修改</small>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">真实姓名</label>
                                    <input type="text" class="form-control" name="realName" th:value="${user.realName}">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">邮箱</label>
                                    <input type="email" class="form-control" name="email" th:value="${user.email}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">手机号</label>
                                    <input type="tel" class="form-control" name="phone" th:value="${user.phone}">
                                </div>
                            </div>
                            <div class="text-end">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-lg me-1"></i>保存修改
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- 当前角色 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-shield-check me-2"></i>当前角色</h5>
                    </div>
                    <div class="card-body">
                        <p class="mb-0">
                            您当前的账号角色：
                            <span sec:authorize="hasRole('ADMIN')" class="badge bg-danger">管理员</span>
                            <span sec:authorize="hasRole('REFEREE') and not hasRole('ADMIN')" class="badge bg-warning">裁判</span>
                            <span sec:authorize="hasRole('ATHLETE') and not hasRole('ADMIN') and not hasRole('REFEREE')" class="badge bg-success">运动员</span>
                            <span sec:authorize="hasRole('SPECTATOR') and not hasRole('ADMIN') and not hasRole('REFEREE') and not hasRole('ATHLETE')" class="badge bg-secondary">观众</span>
                        </p>
                        <hr>
                        <a th:href="@{/profile/role-application}" class="btn btn-outline-primary btn-sm">
                            <i class="bi bi-arrow-up-circle me-1"></i>申请角色升级
                        </a>
                    </div>
                </div>

                <!-- 修改密码 -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-key me-2"></i>修改密码</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/profile/change-password}" method="post">
                            <div class="mb-3">
                                <label class="form-label">当前密码</label>
                                <input type="password" class="form-control" name="oldPassword" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">新密码</label>
                                <input type="password" class="form-control" name="newPassword" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">确认新密码</label>
                                <input type="password" class="form-control" name="confirmPassword" required>
                            </div>
                            <div class="text-end">
                                <button type="submit" class="btn btn-warning">
                                    <i class="bi bi-key me-1"></i>修改密码
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
