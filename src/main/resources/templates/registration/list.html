<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的报名 - 体育赛事管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .registration-card {
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            border-radius: 12px;
            overflow: hidden;
        }
        .registration-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .status-badge {
            font-size: 0.85rem;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-icon {
            font-size: 4rem;
            color: #dee2e6;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="bg-light">
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/dashboard}">
                <i class="bi bi-trophy me-2"></i>体育赛事管理平台
            </a>
            <div class="navbar-nav me-auto">
                <a class="nav-link" th:href="@{/dashboard}">
                    <i class="bi bi-house-door me-1"></i>首页
                </a>
                <a class="nav-link" th:href="@{/events}">
                    <i class="bi bi-calendar-event me-1"></i>赛事
                </a>
                <a class="nav-link active" th:href="@{/registrations}">
                    <i class="bi bi-clipboard-check me-1"></i>我的报名
                </a>
            </div>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text text-white me-3">
                    欢迎，<span sec:authentication="name">用户</span>
                </span>
                <a class="nav-link text-white" th:href="@{/logout}">
                    <i class="bi bi-box-arrow-right me-1"></i>退出
                </a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <!-- 页面标题 -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-clipboard-check me-2"></i>我的报名</h2>
            <a th:href="@{/events}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>浏览赛事
            </a>
        </div>

        <!-- 提示消息 -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${success}">操作成功</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-circle me-2"></i>
            <span th:text="${error}">操作失败</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- 调试信息 -->
        <div class="alert alert-info mb-4">
            <h6><i class="bi bi-bug me-2"></i>调试信息</h6>
            <p class="mb-1">registrations 存在: <span th:text="${registrations != null}">未知</span></p>
            <p class="mb-0">registrations 大小: <span th:text="${registrations?.size() ?: 0}">0</span></p>
            <div th:if="${registrations != null and not #lists.isEmpty(registrations)}">
                <p class="mb-0">第1条数据 event.name: <span th:text="${registrations[0]?.event?.name}">未知</span></p>
            </div>
        </div>

        <!-- 报名列表 -->
        <div th:if="${registrations != null and not #lists.isEmpty(registrations)}" class="row">
            <div th:each="reg : ${registrations}" class="col-md-6 col-lg-4 mb-4">
                <div class="card registration-card shadow-sm h-100">
                    <!-- 赛事封面区域 -->
                    <div class="position-relative">
                        <div class="event-cover text-white text-center py-5" 
                             style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                            <i class="bi bi-trophy" style="font-size: 3rem;"></i>
                        </div>
                        <div class="position-absolute top-0 end-0 m-3">
                            <!-- 状态标签 -->
                            <span th:if="${reg.status == 'PENDING'}" class="badge bg-warning status-badge">
                                <i class="bi bi-clock me-1"></i>待审核
                            </span>
                            <span th:if="${reg.status == 'APPROVED'}" class="badge bg-success status-badge">
                                <i class="bi bi-check-circle me-1"></i>已通过
                            </span>
                            <span th:if="${reg.status == 'REJECTED'}" class="badge bg-danger status-badge">
                                <i class="bi bi-x-circle me-1"></i>已拒绝
                            </span>
                            <span th:if="${reg.status == 'CANCELLED'}" class="badge bg-secondary status-badge">
                                <i class="bi bi-slash-circle me-1"></i>已取消
                            </span>
                        </div>
                    </div>

                    <!-- 卡片内容 -->
                    <div class="card-body">
                        <h5 class="card-title mb-3" th:text="${reg.event?.name ?: '未知赛事'}">赛事名称</h5>
                        
                        <div class="mb-2">
                            <i class="bi bi-calendar3 text-primary me-2"></i>
                            <span th:text="${reg.event?.startDate != null ? #temporals.format(reg.event.startDate, 'yyyy-MM-dd') : '待定'}">日期</span>
                        </div>
                        
                        <div class="mb-2">
                            <i class="bi bi-geo-alt text-danger me-2"></i>
                            <span th:text="${reg.event?.location ?: '待定'}">地点</span>
                        </div>

                        <div class="mb-3">
                            <i class="bi bi-sport me-2"></i>
                            <span th:text="${reg.sportType?.name ?: (reg.customSportTypeName ?: '未知项目')}">运动项目</span>
                        </div>

                        <hr>

                        <div class="small text-muted">
                            <div class="mb-1">
                                <i class="bi bi-person me-2"></i>
                                报名人: <span th:text="${reg.registrantName}">-</span>
                            </div>
                            <div class="mb-1">
                                <i class="bi bi-telephone me-2"></i>
                                电话: <span th:text="${reg.registrantPhone}">-</span>
                            </div>
                            <div>
                                <i class="bi bi-clock me-2"></i>
                                报名时间: <span th:text="${reg.createdTime != null ? #temporals.format(reg.createdTime, 'yyyy-MM-dd HH:mm') : '-'}">-</span>
                            </div>
                        </div>
                    </div>

                    <!-- 卡片底部 -->
                    <div class="card-footer bg-transparent">
                        <th:block th:if="${reg.status == 'APPROVED'}">
                            <div class="d-grid gap-2">
                                <button class="btn btn-success btn-sm" disabled>
                                    <i class="bi bi-check-all me-1"></i>审核已通过
                                </button>
                            </div>
                        </th:block>
                        <th:block th:elif="${reg.status == 'PENDING'}">
                            <div class="d-grid gap-2">
                                <button class="btn btn-outline-danger btn-sm" 
                                        onclick="confirmCancel(this)"
                                        th:data-id="${reg.id}">
                                    <i class="bi bi-x-lg me-1"></i>取消报名
                                </button>
                                <form th:id="'cancelForm-' + ${reg.id}" 
                                      th:action="@{/registrations/{id}/cancel(id=${reg.id})}" 
                                      method="post" 
                                      style="display: none;">
                                </form>
                            </div>
                        </th:block>
                        <th:block th:elif="${reg.status == 'REJECTED'}">
                            <div class="alert alert-danger small mb-0 py-2">
                                <i class="bi bi-exclamation-triangle me-1"></i>
                                <span th:text="${reg.rejectReason ?: '您的报名未通过审核'}">审核未通过</span>
                            </div>
                        </th:block>
                    </div>
                </div>
            </div>
        </div>

        <!-- 空状态 -->
        <div th:if="${registrations == null or #lists.isEmpty(registrations)}" class="empty-state">
            <div class="empty-icon">
                <i class="bi bi-clipboard-x"></i>
            </div>
            <h4 class="text-muted mb-3">暂无报名记录</h4>
            <p class="text-muted mb-4">您还没有报名任何赛事，快去挑选感兴趣的赛事吧！</p>
            <a th:href="@{/events}" class="btn btn-primary btn-lg">
                <i class="bi bi-search me-2"></i>浏览赛事
            </a>
        </div>
    </div>

    <!-- 取消确认 Modal -->
    <div class="modal fade" id="cancelModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-exclamation-triangle text-warning me-2"></i>确认取消
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>确定要取消这个报名吗？取消后将无法恢复。</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">返回</button>
                    <button type="button" class="btn btn-danger" id="confirmCancelBtn">
                        <i class="bi bi-x-lg me-1"></i>确认取消
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let cancelFormId = null;
        
        function confirmCancel(btn) {
            cancelFormId = btn.getAttribute('data-id');
            new bootstrap.Modal(document.getElementById('cancelModal')).show();
        }
        
        document.getElementById('confirmCancelBtn').addEventListener('click', function() {
            if (cancelFormId) {
                document.getElementById('cancelForm-' + cancelFormId).submit();
            }
        });
    </script>
</body>
</html>
