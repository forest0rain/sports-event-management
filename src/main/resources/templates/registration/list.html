<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title>报名管理</title>
</head>
<body>
    <div layout:fragment="page-title">报名管理</div>

    <div layout:fragment="content">
        <!-- 页面内容 -->
        <div class="container-fluid">
            <!-- 搜索筛选 -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <form th:action="@{/registrations}" method="get" class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">赛事</label>
                            <select class="form-select" name="eventId">
                                <option value="">全部赛事</option>
                                <option th:each="event : ${events}" 
                                        th:value="${event.id}" 
                                        th:text="${event.name}"
                                        th:selected="${param.eventId == event.id}">赛事名称</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">运动员</label>
                            <input type="text" class="form-control" name="athleteName" th:value="${param.athleteName}" placeholder="输入运动员姓名">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">状态</label>
                            <select class="form-select" name="status">
                                <option value="">全部</option>
                                <option value="PENDING" th:selected="${param.status == 'PENDING'}">待审核</option>
                                <option value="APPROVED" th:selected="${param.status == 'APPROVED'}">已通过</option>
                                <option value="REJECTED" th:selected="${param.status == 'REJECTED'}">已拒绝</option>
                            </select>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-search me-1"></i>搜索
                            </button>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <a th:href="@{/registrations/new}" class="btn btn-success w-100">
                                <i class="bi bi-plus-lg me-1"></i>新建报名
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 统计卡片 -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body text-center">
                            <h6 class="text-muted mb-1">总报名数</h6>
                            <h3 class="mb-0 text-primary" th:text="${registrations.size()}">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body text-center">
                            <h6 class="text-muted mb-1">待审核</h6>
                            <h3 class="mb-0 text-warning" th:text="${pendingCount ?: 0}">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body text-center">
                            <h6 class="text-muted mb-1">已通过</h6>
                            <h3 class="mb-0 text-success" th:text="${approvedCount ?: 0}">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body text-center">
                            <h6 class="text-muted mb-1">已拒绝</h6>
                            <h3 class="mb-0 text-danger" th:text="${rejectedCount ?: 0}">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 报名列表 -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="bi bi-list-ul me-2"></i>报名列表</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>赛事</th>
                                    <th>运动员</th>
                                    <th>运动项目</th>
                                    <th>报名时间</th>
                                    <th>状态</th>
                                    <th class="text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="reg : ${registrations}">
                                    <td th:text="${reg.id}">1</td>
                                    <td th:text="${reg.event?.name}">赛事名称</td>
                                    <td th:text="${reg.athlete?.name}">运动员姓名</td>
                                    <td th:text="${reg.sportType?.name}">田径</td>
                                    <td th:text="${#temporals.format(reg.registrationTime, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                                    <td>
                                        <span class="badge"
                                              th:classappend="${reg.status == 'APPROVED' ? 'bg-success' : 
                                                               reg.status == 'PENDING' ? 'bg-warning text-dark' : 'bg-danger'}"
                                              th:text="${reg.status}">状态</span>
                                    </td>
                                    <td class="text-center">
                                        <a th:href="@{/registrations/{id}(id=${reg.id})}" class="btn btn-sm btn-outline-primary">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <th:block sec:authorize="hasAnyRole('ADMIN', 'REFEREE')">
                                            <a th:if="${reg.status == 'PENDING'}" 
                                               th:href="@{/admin/registrations/{id}/approve(id=${reg.id})}" 
                                               class="btn btn-sm btn-success">
                                                <i class="bi bi-check-lg"></i>
                                            </a>
                                            <a th:if="${reg.status == 'PENDING'}" 
                                               th:href="@{/admin/registrations/{id}/reject(id=${reg.id})}" 
                                               class="btn btn-sm btn-danger">
                                                <i class="bi bi-x-lg"></i>
                                            </a>
                                        </th:block>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(registrations)}">
                                    <td colspan="7" class="text-center text-muted py-4">
                                        <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                                        暂无报名数据
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
