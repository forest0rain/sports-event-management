<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的报名 - 体育赛事管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">
            <i class="bi bi-trophy me-2"></i>体育赛事管理平台
        </a>
        <div class="navbar-nav me-auto">
            <a class="nav-link" th:href="@{/dashboard}">
                <i class="bi bi-house-door me-1"></i>首页
            </a>
            <a class="nav-link" th:href="@{/events}">
                <i class="bi bi-calendar-event me-1"></i>赛事列表
            </a>
            <a class="nav-link active" th:href="@{/registrations}">
                <i class="bi bi-clipboard-check me-1"></i>我的报名
            </a>
        </div>
        <div class="navbar-nav ms-auto">
            <span class="navbar-text text-white me-3">
                欢迎, <span sec:authentication="name">用户</span>
            </span>
            <a class="nav-link text-white" th:href="@{/logout}">
                <i class="bi bi-box-arrow-right me-1"></i>退出
            </a>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4">
    <!-- 提示消息 -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 页面标题 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-clipboard-check me-2"></i>我的报名</h2>
        <a th:href="@{/events/public}" class="btn btn-primary">
            <i class="bi bi-search me-1"></i>浏览赛事
        </a>
    </div>

    <!-- 报名列表 -->
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">报名记录</h5>
        </div>
        <div class="card-body">
            <div th:if="${#lists.isEmpty(registrations)}" class="text-center py-5">
                <i class="bi bi-inbox fs-1 text-muted"></i>
                <p class="text-muted mt-3">暂无报名记录</p>
                <a th:href="@{/events/public}" class="btn btn-primary">
                    <i class="bi bi-calendar-event me-1"></i>去报名
                </a>
            </div>

            <table th:if="${not #lists.isEmpty(registrations)}" class="table table-hover">
                <thead>
                    <tr>
                        <th>赛事名称</th>
                        <th>参赛项目</th>
                        <th>报名人姓名</th>
                        <th>联系方式</th>
                        <th>参赛号码</th>
                        <th>状态</th>
                        <th>报名时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="reg : ${registrations}">
                        <td>
                            <a th:href="@{/events/{id}(id=${reg.event.id})}" 
                               th:text="${reg.event.name}">赛事名称</a>
                        </td>
                        <td th:text="${reg.sportType.name}">项目名称</td>
                        <td th:text="${reg.registrantName}">姓名</td>
                        <td th:text="${reg.registrantPhone}">电话</td>
                        <td>
                            <span th:if="${reg.bibNumber}" class="badge bg-secondary" 
                                  th:text="${reg.bibNumber}">号码</span>
                            <span th:unless="${reg.bibNumber}" class="text-muted">-</span>
                        </td>
                        <td>
                            <span th:if="${reg.status == 'PENDING'}" class="badge bg-warning text-dark">
                                <i class="bi bi-clock me-1"></i>待审核
                            </span>
                            <span th:if="${reg.status == 'APPROVED'}" class="badge bg-success">
                                <i class="bi bi-check-circle me-1"></i>已通过
                            </span>
                            <span th:if="${reg.status == 'REJECTED'}" class="badge bg-danger">
                                <i class="bi bi-x-circle me-1"></i>已拒绝
                            </span>
                            <span th:if="${reg.status == 'CANCELLED'}" class="badge bg-secondary">
                                <i class="bi bi-ban me-1"></i>已取消
                            </span>
                        </td>
                        <td th:text="${#temporals.format(reg.createdTime, 'yyyy-MM-dd HH:mm')}">时间</td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                <a th:href="@{/events/{id}(id=${reg.event.id})}" 
                                   class="btn btn-outline-primary">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <button th:if="${reg.status == 'PENDING' or reg.status == 'APPROVED'}" 
                                        type="button"
                                        class="btn btn-outline-danger"
                                        th:onclick="'confirmCancel(' + ${reg.id} + ')'">
                                    <i class="bi bi-x-lg"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 取消确认表单 -->
<form id="cancelForm" method="post" style="display: none;">
</form>

<!-- JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function confirmCancel(id) {
        if (confirm('确定要取消该报名吗？')) {
            var form = document.getElementById('cancelForm');
            form.action = '/registrations/' + id + '/cancel';
            form.submit();
        }
    }
</script>
</body>
</html>
