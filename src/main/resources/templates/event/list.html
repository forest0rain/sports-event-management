<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title>赛事管理</title>
</head>
<body>
    <div layout:fragment="page-title">赛事管理</div>

    <div layout:fragment="content">
        <!-- 搜索筛选 -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <form th:action="@{/events}" method="get" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">赛事名称</label>
                        <input type="text" class="form-control" name="name" th:value="${param.name}" placeholder="输入赛事名称">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">状态</label>
                        <select class="form-select" name="status">
                            <option value="">全部</option>
                            <option value="DRAFT" th:selected="${param.status == 'DRAFT'}">草稿</option>
                            <option value="PUBLISHED" th:selected="${param.status == 'PUBLISHED'}">已发布</option>
                            <option value="COMPLETED" th:selected="${param.status == 'COMPLETED'}">已完成</option>
                            <option value="CANCELLED" th:selected="${param.status == 'CANCELLED'}">已取消</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">日期范围</label>
                        <input type="date" class="form-control" name="startDate" th:value="${param.startDate}">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-search me-1"></i>搜索
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">共 <span th:text="${events.totalElements}">0</span> 条记录</h5>
            <a th:href="@{/events/new}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>创建赛事
            </a>
        </div>

        <!-- 赛事列表 -->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>赛事名称</th>
                                <th>地点</th>
                                <th>开始日期</th>
                                <th>结束日期</th>
                                <th>报名人数</th>
                                <th>状态</th>
                                <th class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="event : ${events}">
                                <td th:text="${event.id}">1</td>
                                <td>
                                    <a th:href="@{/events/{id}(id=${event.id})}" th:text="${event.name}">赛事名称</a>
                                </td>
                                <td th:text="${event.location}">地点</td>
                                <td th:text="${#temporals.format(event.startDate, 'yyyy-MM-dd')}">2024-01-01</td>
                                <td th:text="${#temporals.format(event.endDate, 'yyyy-MM-dd')}">2024-01-03</td>
                                <td th:text="${event.registrationCount ?: 0}">0</td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${event.status == 'PUBLISHED' ? 'bg-success' : 
                                                           event.status == 'DRAFT' ? 'bg-secondary' :
                                                           event.status == 'COMPLETED' ? 'bg-primary' : 'bg-danger'}"
                                          th:text="${event.status}">状态</span>
                                </td>
                                <td class="text-center">
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/events/{id}(id=${event.id})}" class="btn btn-outline-primary">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <a th:href="@{/events/{id}/edit(id=${event.id})}" class="btn btn-outline-secondary">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <form th:action="@{/events/{id}/delete(id=${event.id})}" method="post" style="display:inline;"
                                              onsubmit="return confirm('确定删除该赛事吗？');">
                                            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                                            <button type="submit" class="btn btn-outline-danger">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(events)}">
                                <td colspan="8" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                                    暂无赛事数据
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
