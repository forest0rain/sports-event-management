<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}"
      lang="zh-CN">
<head>
    <title>赛事表单 - 体育赛事管理平台</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="${event.id != null} ? '编辑赛事' : '创建赛事'">创建赛事</h2>
        <a th:href="@{/events}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>返回列表
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="${event.id != null} ? @{/events/{id}/edit(id=${event.id})} : @{/events/create}" 
                  th:object="${event}" method="post">

                <div class="row mb-3">
                    <div class="col-md-8">
                        <label class="form-label">赛事名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{name}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">简称</label>
                        <input type="text" class="form-control" th:field="*{shortName}">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">赛事类型 <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{eventType}" required>
                            <option value="">请选择</option>
                            <option value="校园">校园</option>
                            <option value="企业">企业</option>
                            <option value="社区">社区</option>
                            <option value="市级">市级</option>
                            <option value="省级">省级</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">开始日期 <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" th:field="*{startDate}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">结束日期 <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" th:field="*{endDate}" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">报名截止日期</label>
                        <input type="date" class="form-control" th:field="*{registrationDeadline}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">最大参赛人数</label>
                        <input type="number" class="form-control" th:field="*{maxParticipants}" min="1">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">报名限制</label>
                        <select class="form-select" th:field="*{registrationScope}">
                            <option value="ALL">所有人可报名</option>
                            <option value="ATHLETE">仅运动员可报名</option>
                            <option value="STUDENT">仅学生可报名</option>
                            <option value="STAFF">仅教职工可报名</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">是否公开</label>
                        <div class="form-check mt-2">
                            <input type="checkbox" class="form-check-input" th:field="*{isPublic}">
                            <label class="form-check-label">公开赛事</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">报名审核</label>
                        <div class="form-check mt-2">
                            <input type="checkbox" class="form-check-input" th:field="*{requireApproval}">
                            <label class="form-check-label">需要审核</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">赛事状态</label>
                        <select class="form-select" th:field="*{status}">
                            <option value="DRAFT">草稿</option>
                            <option value="PUBLISHED">已发布</option>
                            <option value="REGISTRATION">报名中</option>
                            <option value="IN_PROGRESS">进行中</option>
                            <option value="COMPLETED">已结束</option>
                            <option value="CANCELLED">已取消</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">主办方</label>
                        <input type="text" class="form-control" th:field="*{organizer}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">赞助商</label>
                        <input type="text" class="form-control" th:field="*{sponsor}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">赛事描述</label>
                    <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">比赛规则</label>
                    <textarea class="form-control" th:field="*{rules}" rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">奖项设置</label>
                    <textarea class="form-control" th:field="*{awards}" rows="3"></textarea>
                </div>

                <div class="text-end">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>保存
                    </button>
                    <a th:href="@{/events}" class="btn btn-outline-secondary ms-2">取消</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
