<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛事表单 - 体育赛事管理平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/dashboard}">
      <i class="bi bi-trophy me-2"></i>体育赛事管理平台
    </a>
    <div class="navbar-nav me-auto">
      <a class="nav-link text-white" th:href="@{/dashboard}">
        <i class="bi bi-house-door me-1"></i>主页
      </a>
    </div>
    <div class="navbar-nav ms-auto">
            <span class="navbar-text text-white me-3">
                欢迎, <span sec:authentication="name">用户</span>
            </span>
      <a class="nav-link text-white" th:href="@{/logout}">
        <i class="bi bi-box-arrow-right me-1"></i>退出
      </a>
    </div>
  </div>
</nav>

<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 th:text="${event.id != null} ? '编辑赛事' : '创建赛事'">创建赛事</h2>
    <a th:href="@{/events}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i>返回列表
    </a>
  </div>

  <div class="card">
    <div class="card-body">
      <!-- 编辑赛事表单 -->
      <form th:if="${event.id != null}"
            th:action="@{/events/{id}/edit(id=${event.id})}"
            th:object="${event}" method="post">

        <div class="row mb-3">
          <div class="col-md-8">
            <label class="form-label">赛事名称 <span class="text-danger">*</span></label>
            <input type="text" class="form-control" th:field="*{name}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">简称</label>
            <input type="text" class="form-control" th:field="*{shortName}">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label">赛事类型 <span class="text-danger">*</span></label>
            <select class="form-select" th:field="*{eventType}" required>
              <option value="">请选择</option>
              <option value="校园">校园</option>
              <option value="企业">企业</option>
              <option value="社区">社区</option>
              <option value="市级">市级</option>
              <option value="省级">省级</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">开始日期 <span class="text-danger">*</span></label>
            <input type="date" class="form-control" th:field="*{startDate}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">结束日期 <span class="text-danger">*</span></label>
            <input type="date" class="form-control" th:field="*{endDate}" required>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label">报名截止日期</label>
            <input type="date" class="form-control" th:field="*{registrationDeadline}">
          </div>
          <div class="col-md-4">
            <label class="form-label">最大参赛人数</label>
            <input type="number" class="form-control" th:field="*{maxParticipants}" min="1">
          </div>
          <div class="col-md-4">
            <label class="form-label">是否公开</label>
            <div class="form-check mt-2">
              <input type="checkbox" class="form-check-input" th:field="*{isPublic}">
              <label class="form-check-label">公开赛事</label>
            </div>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">主办方</label>
            <input type="text" class="form-control" th:field="*{organizer}">
          </div>
          <div class="col-md-6">
            <label class="form-label">赞助商</label>
            <input type="text" class="form-control" th:field="*{sponsor}">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">赛事描述</label>
          <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">比赛规则</label>
          <textarea class="form-control" th:field="*{rules}" rows="3"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">奖项设置</label>
          <textarea class="form-control" th:field="*{awards}" rows="3"></textarea>
        </div>

        <div class="text-end">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>保存
          </button>
          <a th:href="@{/events}" class="btn btn-outline-secondary ms-2">取消</a>
        </div>
      </form>

      <!-- 创建赛事表单 -->
      <form th:unless="${event.id != null}"
            th:action="@{/events/create}"
            th:object="${event}" method="post">

        <div class="row mb-3">
          <div class="col-md-8">
            <label class="form-label">赛事名称 <span class="text-danger">*</span></label>
            <input type="text" class="form-control" th:field="*{name}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">简称</label>
            <input type="text" class="form-control" th:field="*{shortName}">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label">赛事类型 <span class="text-danger">*</span></label>
            <select class="form-select" th:field="*{eventType}" required>
              <option value="">请选择</option>
              <option value="校园">校园</option>
              <option value="企业">企业</option>
              <option value="社区">社区</option>
              <option value="市级">市级</option>
              <option value="省级">省级</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">开始日期 <span class="text-danger">*</span></label>
            <input type="date" class="form-control" th:field="*{startDate}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">结束日期 <span class="text-danger">*</span></label>
            <input type="date" class="form-control" th:field="*{endDate}" required>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label">报名截止日期</label>
            <input type="date" class="form-control" th:field="*{registrationDeadline}">
          </div>
          <div class="col-md-4">
            <label class="form-label">最大参赛人数</label>
            <input type="number" class="form-control" th:field="*{maxParticipants}" min="1">
          </div>
          <div class="col-md-4">
            <label class="form-label">是否公开</label>
            <div class="form-check mt-2">
              <input type="checkbox" class="form-check-input" th:field="*{isPublic}">
              <label class="form-check-label">公开赛事</label>
            </div>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">主办方</label>
            <input type="text" class="form-control" th:field="*{organizer}">
          </div>
          <div class="col-md-6">
            <label class="form-label">赞助商</label>
            <input type="text" class="form-control" th:field="*{sponsor}">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">赛事描述</label>
          <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">比赛规则</label>
          <textarea class="form-control" th:field="*{rules}" rows="3"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">奖项设置</label>
          <textarea class="form-control" th:field="*{awards}" rows="3"></textarea>
        </div>

        <div class="text-end">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>保存
          </button>
          <a th:href="@{/events}" class="btn btn-outline-secondary ms-2">取消</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
