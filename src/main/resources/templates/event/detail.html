<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛事详情 - 体育赛事管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/dashboard}">
                <i class="bi bi-trophy me-2"></i>体育赛事管理平台
            </a>
            <div class="navbar-nav me-auto">
                <a class="nav-link text-white" th:href="@{/dashboard}">
                    <i class="bi bi-house-door me-1"></i>主页
                </a>
            </div>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text text-white me-3">
                    欢迎，<span sec:authentication="name">用户</span>
                </span>
                <a class="nav-link text-white" th:href="@{/logout}">
                    <i class="bi bi-box-arrow-right me-1"></i>退出
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- 提示消息 -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}">操作成功</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}">操作失败</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 th:text="${event.name}">赛事详情</h2>
            <div>
                <a th:href="@{/events}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>返回列表
                </a>
                <a th:href="@{/events/{id}/edit(id=${event.id})}" class="btn btn-primary">
                    <i class="bi bi-pencil me-1"></i>编辑
                </a>
            </div>
        </div>

        <!-- 基本信息 -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">基本信息</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <table class="table table-borderless">
                            <tr>
                                <td class="text-muted" width="120">赛事名称</td>
                                <td th:text="${event.name}">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">简称</td>
                                <td th:text="${event.shortName}">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">赛事类型</td>
                                <td th:text="${event.eventType}">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">状态</td>
                                <td>
                                    <span th:if="${event.status == 'DRAFT'}" class="badge bg-secondary">草稿</span>
                                    <span th:if="${event.status == 'REGISTRATION'}" class="badge bg-primary">报名中</span>
                                    <span th:if="${event.status == 'ONGOING'}" class="badge bg-success">进行中</span>
                                    <span th:if="${event.status == 'FINISHED'}" class="badge bg-info">已结束</span>
                                    <span th:if="${event.status == 'CANCELLED'}" class="badge bg-danger">已取消</span>
                                </td>
                            </tr>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <table class="table table-borderless">
                            <tr>
                                <td class="text-muted" width="120">开始日期</td>
                                <td th:text="${#temporals.format(event.startDate, 'yyyy-MM-dd')}">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">结束日期</td>
                                <td th:text="${#temporals.format(event.endDate, 'yyyy-MM-dd')}">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">报名截止</td>
                                <td th:text="${event.registrationDeadline != null} ? ${#temporals.format(event.registrationDeadline, 'yyyy-MM-dd')} : '未设置'">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">参赛人数</td>
                                <td>
                                    <span th:text="${event.currentParticipants}">0</span> / 
                                    <span th:text="${event.maxParticipants}">100</span>
                                </td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 赛事操作 -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">赛事操作</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <h6 class="mb-3">快速操作（按流程执行）</h6>
                        <div class="d-flex flex-wrap gap-2">
                            <form th:if="${event.status == 'DRAFT'}" th:action="@{/events/{id}/publish(id=${event.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-success">
                                    <i class="bi bi-megaphone me-1"></i>发布赛事
                                </button>
                            </form>
                            <form th:if="${event.status == 'REGISTRATION'}" th:action="@{/events/{id}/start(id=${event.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-play-fill me-1"></i>开始赛事
                                </button>
                            </form>
                            <form th:if="${event.status == 'ONGOING'}" th:action="@{/events/{id}/finish(id=${event.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-info text-white">
                                    <i class="bi bi-check-lg me-1"></i>结束赛事
                                </button>
                            </form>
                            <form th:if="${event.status != 'CANCELLED' and event.status != 'FINISHED'}" th:action="@{/events/{id}/cancel(id=${event.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-outline-danger" onclick="return confirm('确定要取消赛事吗？')">
                                    <i class="bi bi-x-lg me-1"></i>取消赛事
                                </button>
                            </form>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <h6 class="mb-3">手动修改状态</h6>
                        <form th:action="@{/events/{id}/status(id=${event.id})}" method="post" class="d-flex gap-2">
                            <select name="status" class="form-select" style="width: auto;">
                                <option value="DRAFT" th:selected="${event.status == 'DRAFT'}">草稿</option>
                                <option value="REGISTRATION" th:selected="${event.status == 'REGISTRATION'}">报名中</option>
                                <option value="ONGOING" th:selected="${event.status == 'ONGOING'}">进行中</option>
                                <option value="FINISHED" th:selected="${event.status == 'FINISHED'}">已结束</option>
                                <option value="CANCELLED" th:selected="${event.status == 'CANCELLED'}">已取消</option>
                            </select>
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-arrow-repeat me-1"></i>更新状态
                            </button>
                        </form>
                        <small class="text-muted mt-2 d-block">
                            <i class="bi bi-info-circle me-1"></i>修改为"进行中"或"已结束"时，会自动同步日期
                        </small>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 组织信息 -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">组织信息</h5>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <strong class="text-muted">主办方</strong>
                        <p th:text="${event.organizer} ?: '未设置'">-</p>
                    </div>
                    <div class="col-md-6">
                        <strong class="text-muted">赞助商</strong>
                        <p th:text="${event.sponsor} ?: '未设置'">-</p>
                    </div>
                </div>
                <div class="mb-3">
                    <strong class="text-muted">赛事描述</strong>
                    <p th:text="${event.description} ?: '未设置'">-</p>
                </div>
                <div class="mb-3">
                    <strong class="text-muted">比赛规则</strong>
                    <p th:text="${event.rules} ?: '未设置'">-</p>
                </div>
                <div class="mb-3">
                    <strong class="text-muted">奖项设置</strong>
                    <p th:text="${event.awards} ?: '未设置'">-</p>
                </div>
            </div>
        </div>
        
        <!-- 危险操作 -->
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">危险操作</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/events/{id}/delete(id=${event.id})}" method="post" 
                      onsubmit="return confirm('确定要删除该赛事吗？此操作不可恢复！')">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i>删除赛事
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
