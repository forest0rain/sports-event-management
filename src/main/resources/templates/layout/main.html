<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/fragments :: head('管理后台')}">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/dashboard}">
                <i class="bi bi-trophy me-2"></i>体育赛事管理
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>
                            <span sec:authentication="name">用户</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" th:href="@{/profile}">
                                <i class="bi bi-person me-2"></i>个人信息
                            </a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" th:href="@{/logout}">
                                <i class="bi bi-box-arrow-right me-2"></i>退出登录
                            </a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- 左侧固定侧边栏 -->
            <nav class="col-md-2 d-md-block bg-light sidebar collapse show" id="sidebarMenu">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a th:href="@{/dashboard}" class="nav-link">
                                <i class="bi bi-house me-2"></i>仪表盘
                            </a>
                        </li>
                        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                            <a th:href="@{/admin/users}" class="nav-link">
                                <i class="bi bi-people me-2"></i>用户管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a th:href="@{/events}" class="nav-link">
                                <i class="bi bi-calendar-event me-2"></i>赛事管理
                            </a>
                        </li>
                        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                            <a th:href="@{/athletes}" class="nav-link">
                                <i class="bi bi-person-badge me-2"></i>运动员管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a th:href="@{/schedules}" class="nav-link">
                                <i class="bi bi-clock me-2"></i>赛程管理
                            </a>
                        </li>
                        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'REFEREE', 'ORGANIZER')">
                            <a th:href="@{/schedule-generation}" class="nav-link">
                                <i class="bi bi-magic me-2"></i>智能编排
                            </a>
                        </li>
                        <li class="nav-item">
                            <a th:href="@{/results}" class="nav-link">
                                <i class="bi bi-graph-up me-2"></i>成绩管理
                            </a>
                        </li>
                        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'REFEREE')">
                            <a th:href="@{/results/statistics}" class="nav-link">
                                <i class="bi bi-bar-chart me-2"></i>数据统计
                            </a>
                        </li>
                        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'REFEREE')">
                            <a th:href="@{/admin/registrations}" class="nav-link">
                                <i class="bi bi-clipboard-check me-2"></i>报名审核
                            </a>
                        </li>
                        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                            <a th:href="@{/admin/role-applications}" class="nav-link">
                                <i class="bi bi-person-check me-2"></i>角色审核
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- 主内容区 -->
            <main class="col-md-10 ms-sm-auto px-md-4">
                <!-- 消息提示 -->
                <div th:replace="~{layout/fragments :: messages}"></div>
                
                <!-- 页面标题 -->
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h4" layout:fragment="page-title">页面标题</h1>
                    <div layout:fragment="page-actions"></div>
                </div>
                
                <!-- 页面内容 -->
                <div layout:fragment="content">
                </div>
            </main>
        </div>
    </div>
    
    <!-- JavaScript -->
    <div th:replace="~{layout/fragments :: scripts}"></div>
    
    <!-- 页面特定脚本 -->
    <th:block layout:fragment="scripts-extra"></th:block>
</body>
</html>
