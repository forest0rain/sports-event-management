<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - 体育赛事管理平台'">体育赛事管理平台</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<!-- 导航栏 -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">
            <i class="bi bi-trophy me-2"></i>体育赛事管理平台
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">
                        <i class="bi bi-house me-1"></i>首页
                    </a>
                </li>
                <!-- 管理员和裁判显示完整管理菜单 -->
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'REFEREE')">
                    <a class="nav-link" th:href="@{/events}">
                        <i class="bi bi-calendar-event me-1"></i>赛事管理
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'REFEREE')">
                    <a class="nav-link" th:href="@{/schedules}">
                        <i class="bi bi-clock me-1"></i>赛程管理
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'REFEREE')">
                    <a class="nav-link" th:href="@{/results}">
                        <i class="bi bi-graph-up me-1"></i>成绩管理
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'REFEREE')">
                    <a class="nav-link" th:href="@{/admin/registrations}">
                        <i class="bi bi-clipboard-check me-1"></i>报名审核
                    </a>
                </li>
                <!-- 运动员和观众显示赛事浏览 -->
                <li class="nav-item" sec:authorize="!hasAnyRole('ADMIN', 'REFEREE')">
                    <a class="nav-link" th:href="@{/events/public}">
                        <i class="bi bi-calendar-event me-1"></i>赛事列表
                    </a>
                </li>
                <!-- 所有登录用户显示我的报名 -->
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/registrations}">
                        <i class="bi bi-clipboard-plus me-1"></i>我的报名
                    </a>
                </li>
                <!-- 管理员显示运动员管理 -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/athletes}">
                        <i class="bi bi-person-badge me-1"></i>运动员管理
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">用户</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/profile}">
                            <i class="bi bi-person me-2"></i>个人信息
                        </a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/logout}">
                            <i class="bi bi-box-arrow-right me-2"></i>退出登录
                        </a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- 侧边栏 -->
<div th:fragment="sidebar" class="d-flex flex-column p-3 bg-light" style="width: 250px; min-height: 100vh;">
    <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item">
            <a th:href="@{/dashboard}" class="nav-link">
                <i class="bi bi-house me-2"></i>仪表盘
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/events}" class="nav-link">
                <i class="bi bi-calendar-event me-2"></i>赛事管理
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/athletes}" class="nav-link">
                <i class="bi bi-person-badge me-2"></i>运动员管理
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/schedules}" class="nav-link">
                <i class="bi bi-clock me-2"></i>赛程管理
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/results}" class="nav-link">
                <i class="bi bi-graph-up me-2"></i>成绩管理
            </a>
        </li>
        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'REFEREE')">
            <a th:href="@{/results/statistics}" class="nav-link">
                <i class="bi bi-bar-chart me-2"></i>数据统计
            </a>
        </li>
    </ul>
</div>

<!-- 消息提示 -->
<div th:fragment="messages">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${message}" class="alert alert-info alert-dismissible fade show" role="alert">
        <i class="bi bi-info-circle me-2"></i>
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- 分页组件 -->
<nav th:fragment="pagination(page)" aria-label="Page navigation" th:if="${page != null}">
    <p class="text-center text-muted">
        共 <span th:text="${page.totalElements}">0</span> 条记录，
        当前第 <span th:text="${page.number + 1}">1</span> / <span th:text="${page.totalPages}">1</span> 页
    </p>
    <ul class="pagination justify-content-center" th:if="${page.totalPages > 1}">
        <li class="page-item" th:classappend="${page.first} ? 'disabled' : ''">
            <a class="page-link" th:href="@{${#httpServletRequest.requestURI}(page=${page.number - 1})}">
                <i class="bi bi-chevron-left"></i>
            </a>
        </li>
        <li class="page-item active">
            <a class="page-link" th:text="${page.number + 1}">1</a>
        </li>
        <li class="page-item" th:classappend="${page.last} ? 'disabled' : ''">
            <a class="page-link" th:href="@{${#httpServletRequest.requestURI}(page=${page.number + 1})}">
                <i class="bi bi-chevron-right"></i>
            </a>
        </li>
    </ul>
</nav>

<!-- 页脚 -->
<footer th:fragment="footer" class="footer mt-auto py-3 bg-light">
    <div class="container text-center">
        <span class="text-muted">&copy; 2024 体育赛事管理平台 | Powered by Spring Boot</span>
    </div>
</footer>

<!-- JavaScript -->
<div th:fragment="scripts">
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</div>
</html>
