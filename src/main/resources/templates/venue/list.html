<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title>场地管理</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">场地管理</h4>
        <a th:href="@{/venues/create}" class="btn btn-primary" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-plus-lg me-1"></i>新增场地
        </a>
    </div>

    <!-- 搜索栏 -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/venues}" method="get" class="row g-3">
                <div class="col-md-4">
                    <input type="text" class="form-control" name="keyword" th:value="${keyword}" placeholder="搜索场地名称...">
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="type">
                        <option value="">所有类型</option>
                        <option th:each="t : ${venueTypes}" th:value="${t}" th:text="${t}" th:selected="${type == t}">类型</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-outline-primary w-100">
                        <i class="bi bi-search me-1"></i>搜索
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 统计信息 -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="text-primary" th:text="${venues.totalElements}">0</h5>
                    <small class="text-muted">场地总数</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="text-success" th:text="${#lists.size(venues.content.?[enabled == true])}">0</h5>
                    <small class="text-muted">启用中</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="text-warning" th:text="${#lists.size(venues.content.?[enabled == false])}">0</h5>
                    <small class="text-muted">已禁用</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="text-info" th:text="${#aggregates.sum(venues.content.?[enabled == true].![capacity])}">0</h5>
                    <small class="text-muted">总容量</small>
                </div>
            </div>
        </div>
    </div>

    <!-- 场地列表 -->
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>场地名称</th>
                            <th>类型</th>
                            <th>位置</th>
                            <th>容量</th>
                            <th>最大同时赛事</th>
                            <th>联系人</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="venue : ${venues.content}">
                            <td th:text="${venue.id}">1</td>
                            <td>
                                <a th:href="@{/venues/{id}(id=${venue.id})}" th:text="${venue.name}" class="text-decoration-none fw-bold">场地名</a>
                            </td>
                            <td>
                                <span class="badge bg-info" th:text="${venue.type}">类型</span>
                            </td>
                            <td th:text="${venue.location}">位置</td>
                            <td th:text="${venue.capacity}">容量</td>
                            <td th:text="${venue.maxConcurrentEvents}">1</td>
                            <td th:text="${venue.contactPerson}">联系人</td>
                            <td>
                                <span th:if="${venue.enabled}" class="badge bg-success">启用</span>
                                <span th:unless="${venue.enabled}" class="badge bg-secondary">禁用</span>
                            </td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/venues/{id}(id=${venue.id})}" class="btn btn-outline-info" title="详情">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/venues/{id}/edit(id=${venue.id})}" class="btn btn-outline-primary" title="编辑" sec:authorize="hasRole('ADMIN')">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/venues/{id}/toggle(id=${venue.id})}" method="post" class="d-inline" sec:authorize="hasRole('ADMIN')">
                                        <button type="submit" class="btn btn-outline-warning" th:title="${venue.enabled} ? '禁用' : '启用'">
                                            <i class="bi" th:classappend="${venue.enabled} ? 'bi-pause-circle' : 'bi-play-circle'"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${venues.empty}">
                            <td colspan="9" class="text-center text-muted py-4">暂无场地数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <!-- 分页 -->
        <div class="card-footer" th:if="${venues.totalPages > 1}">
            <nav>
                <ul class="pagination pagination-sm mb-0 justify-content-center">
                    <li class="page-item" th:classappend="${venues.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/venues(page=${venues.number - 1})}">上一页</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, venues.totalPages - 1)}"
                        th:classappend="${i == venues.number} ? 'active'">
                        <a class="page-link" th:href="@{/venues(page=${i})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${venues.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/venues(page=${venues.number + 1})}">下一页</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</body>
</html>
