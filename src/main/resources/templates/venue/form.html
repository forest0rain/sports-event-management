<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title>场地表单</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0" th:text="${venue.id != null} ? '编辑场地' : '新增场地'">场地表单</h4>
        <a th:href="@{/venues}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>返回列表
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form th:action="${venue.id != null} ? @{/venues/{id}(id=${venue.id})} : @{/venues}" 
                          method="post" th:object="${venue}">
                        
                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">场地名称 <span class="text-danger">*</span></label>
                            <div class="col-sm-9">
                                <input type="text" class="form-control" th:field="*{name}" required placeholder="请输入场地名称">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">场地类型 <span class="text-danger">*</span></label>
                            <div class="col-sm-9">
                                <select class="form-select" th:field="*{type}" required>
                                    <option value="">请选择类型</option>
                                    <option th:each="t : ${venueTypes}" th:value="${t}" th:text="${t}">类型</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">位置</label>
                            <div class="col-sm-9">
                                <input type="text" class="form-control" th:field="*{location}" placeholder="请输入场地位置">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">容量 <span class="text-danger">*</span></label>
                            <div class="col-sm-9">
                                <input type="number" class="form-control" th:field="*{capacity}" required min="1" placeholder="请输入容量">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">最大同时赛事数 <span class="text-danger">*</span></label>
                            <div class="col-sm-9">
                                <input type="number" class="form-control" th:field="*{maxConcurrentEvents}" required min="1" placeholder="请输入最大同时赛事数">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">设施描述</label>
                            <div class="col-sm-9">
                                <textarea class="form-control" th:field="*{facilities}" rows="3" placeholder="请描述场地设施"></textarea>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">场地描述</label>
                            <div class="col-sm-9">
                                <textarea class="form-control" th:field="*{description}" rows="3" placeholder="请输入场地描述"></textarea>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">联系人</label>
                            <div class="col-sm-9">
                                <input type="text" class="form-control" th:field="*{contactPerson}" placeholder="请输入联系人">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">联系电话</label>
                            <div class="col-sm-9">
                                <input type="text" class="form-control" th:field="*{contactPhone}" placeholder="请输入联系电话">
                            </div>
                        </div>

                        <div class="row mb-3" th:if="${venue.id != null}">
                            <label class="col-sm-3 col-form-label">状态</label>
                            <div class="col-sm-9">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" th:field="*{enabled}">
                                    <label class="form-check-label" th:text="${venue.enabled} ? '启用' : '禁用'">启用</label>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-sm-9 offset-sm-3">
                                <button type="submit" class="btn btn-primary me-2">
                                    <i class="bi bi-check-lg me-1"></i>保存
                                </button>
                                <a th:href="@{/venues}" class="btn btn-outline-secondary">取消</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
