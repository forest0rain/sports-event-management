<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title>仪表盘</title>
</head>
<body>
    <div layout:fragment="page-title">仪表盘</div>

    <div layout:fragment="content">
        <!-- 欢迎信息 -->
        <div class="alert alert-info alert-dismissible fade show" role="alert">
            <div class="d-flex align-items-center">
                <div>
                    <strong>欢迎回来，<span sec:authentication="name">用户</span>！</strong>
                    <span sec:authorize="hasRole('ADMIN')" class="badge bg-danger ms-2">管理员</span>
                    <span sec:authorize="hasRole('REFEREE')" class="badge bg-warning ms-2">裁判</span>
                    <span sec:authorize="hasRole('ATHLETE')" class="badge bg-success ms-2">运动员</span>
                </div>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- 统计卡片 -->
        <div class="row g-4 mb-4">
            <div class="col-md-6 col-lg-3">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0">
                                <div class="bg-primary bg-gradient rounded-3 p-3">
                                    <i class="bi bi-calendar-event text-white fs-4"></i>
                                </div>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <h6 class="text-muted mb-1">总赛事数</h6>
                                <h3 class="mb-0" id="statEvents">-</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0">
                                <div class="bg-success bg-gradient rounded-3 p-3">
                                    <i class="bi bi-person-badge text-white fs-4"></i>
                                </div>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <h6 class="text-muted mb-1">注册运动员</h6>
                                <h3 class="mb-0" id="statAthletes">-</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0">
                                <div class="bg-warning bg-gradient rounded-3 p-3">
                                    <i class="bi bi-clock text-white fs-4"></i>
                                </div>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <h6 class="text-muted mb-1">总赛程数</h6>
                                <h3 class="mb-0" id="statSchedules">-</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0">
                                <div class="bg-info bg-gradient rounded-3 p-3">
                                    <i class="bi bi-trophy text-white fs-4"></i>
                                </div>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <h6 class="text-muted mb-1">有效成绩数</h6>
                                <h3 class="mb-0" id="statResults">-</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="row g-4 mb-4">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0"><i class="bi bi-pie-chart me-2"></i>赛事状态分布</h5>
                    </div>
                    <div class="card-body">
                        <div id="eventChart" style="height: 250px;">
                            <div class="text-center text-muted py-5">
                                <i class="bi bi-pie-chart fs-1"></i>
                                <p class="mt-2 mb-0">暂无数据</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0"><i class="bi bi-bar-chart me-2"></i>运动员年龄段分布</h5>
                    </div>
                    <div class="card-body">
                        <div id="athleteAgeChart" style="height: 250px;">
                            <div class="text-center text-muted py-5">
                                <i class="bi bi-bar-chart fs-1"></i>
                                <p class="mt-2 mb-0">暂无数据</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 管理功能快捷入口 -->
        <div class="card border-0 shadow-sm" sec:authorize="hasAnyRole('ADMIN', 'REFEREE')">
            <div class="card-header bg-white">
                <h5 class="mb-0"><i class="bi bi-lightning me-2"></i>管理功能</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-3">
                        <a th:href="@{/events}" class="btn btn-outline-primary w-100 py-3">
                            <i class="bi bi-calendar-event fs-3 d-block mb-2"></i>
                            赛事管理
                        </a>
                    </div>
                    <div class="col-md-3" sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/athletes}" class="btn btn-outline-success w-100 py-3">
                            <i class="bi bi-person-badge fs-3 d-block mb-2"></i>
                            运动员管理
                        </a>
                    </div>
                    <div class="col-md-3">
                        <a th:href="@{/schedule-generation}" class="btn btn-success w-100 py-3">
                            <i class="bi bi-magic fs-3 d-block mb-2"></i>
                            智能编排
                        </a>
                    </div>
                    <div class="col-md-3">
                        <a th:href="@{/statistics}" class="btn btn-outline-info w-100 py-3">
                            <i class="bi bi-graph-up fs-3 d-block mb-2"></i>
                            数据统计
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts-extra">
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        loadStatistics();

        function loadStatistics() {
            fetch('/api/dashboard/statistics')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('statEvents').textContent = data.totalEvents || 0;
                    document.getElementById('statAthletes').textContent = data.totalAthletes || 0;
                    document.getElementById('statSchedules').textContent = data.totalSchedules || 0;
                    document.getElementById('statResults').textContent = data.totalResults || 0;

                    renderEventChart(data.eventStatusDistribution);
                    renderAthleteAgeChart(data.athleteAgeDistribution);
                })
                .catch(error => {
                    console.error('加载统计失败:', error);
                });
        }

        function renderEventChart(distribution) {
            const container = document.getElementById('eventChart');
            if (!distribution || distribution.length === 0) return;

            let html = '<div class="row">';
            distribution.forEach(item => {
                const colors = {'PUBLISHED': 'bg-success', 'DRAFT': 'bg-secondary', 'CANCELLED': 'bg-danger', 'COMPLETED': 'bg-primary'};
                html += `
                    <div class="col-6 mb-3">
                        <div class="d-flex align-items-center">
                            <span class="badge ${colors[item.status] || 'bg-secondary'} me-2">${item.status}</span>
                            <strong>${item.count}</strong>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function renderAthleteAgeChart(distribution) {
            const container = document.getElementById('athleteAgeChart');
            if (!distribution || distribution.length === 0) return;

            let html = '<div class="row">';
            distribution.forEach(item => {
                html += `
                    <div class="col-6 mb-3">
                        <div class="d-flex align-items-center">
                            <span class="badge bg-info me-2">${item.ageGroup}</span>
                            <strong>${item.count}人</strong>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }
    });
    </script>
    </th:block>
</body>
</html>
