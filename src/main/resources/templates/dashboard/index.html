<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/main}">
<head>
    <title>仪表盘 - 体育赛事管理平台</title>
</head>
<body>
<div layout:fragment="content">
    <!-- 隐藏数据容器 -->
    <script type="application/json" id="event-status-data" th:utext="${eventStatusJson}">[]</script>
    <script type="application/json" id="athlete-age-data" th:utext="${athleteAgeGroupJson}">[]</script>

    <!-- 统计卡片 -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0 bg-primary bg-opacity-10 rounded-3 p-3">
                            <i class="bi bi-trophy text-primary fs-4"></i>
                        </div>
                        <div class="flex-grow-1 ms-3">
                            <div class="text-muted small">赛事总数</div>
                            <div class="fs-4 fw-bold" th:text="${stats.totalEvents}">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0 bg-success bg-opacity-10 rounded-3 p-3">
                            <i class="bi bi-people text-success fs-4"></i>
                        </div>
                        <div class="flex-grow-1 ms-3">
                            <div class="text-muted small">运动员总数</div>
                            <div class="fs-4 fw-bold" th:text="${stats.totalAthletes}">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0 bg-warning bg-opacity-10 rounded-3 p-3">
                            <i class="bi bi-clipboard-check text-warning fs-4"></i>
                        </div>
                        <div class="flex-grow-1 ms-3">
                            <div class="text-muted small">待审核报名</div>
                            <div class="fs-4 fw-bold" th:text="${stats.pendingRegistrations}">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0 bg-info bg-opacity-10 rounded-3 p-3">
                            <i class="bi bi-calendar-event text-info fs-4"></i>
                        </div>
                        <div class="flex-grow-1 ms-3">
                            <div class="text-muted small">进行中赛事</div>
                            <div class="fs-4 fw-bold" th:text="${stats.ongoingEventsCount}">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 图表区域 -->
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white">
                    <h6 class="mb-0"><i class="bi bi-pie-chart me-2"></i>赛事状态分布</h6>
                </div>
                <div class="card-body">
                    <div style="height:250px;position:relative;">
                        <canvas id="eventStatusChart"></canvas>
                        <div id="eventStatusEmpty" class="text-center text-muted d-flex align-items-center justify-content-center" style="height:250px;position:absolute;top:0;left:0;right:0;">
                            <span>暂无数据</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white">
                    <h6 class="mb-0"><i class="bi bi-bar-chart me-2"></i>运动员年龄段分布</h6>
                </div>
                <div class="card-body">
                    <div style="height:250px;position:relative;">
                        <canvas id="athleteAgeChart"></canvas>
                        <div id="athleteAgeEmpty" class="text-center text-muted d-flex align-items-center justify-content-center" style="height:250px;position:absolute;top:0;left:0;right:0;">
                            <span>暂无数据</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 进行中赛事 + 报名中赛事 -->
    <div class="row g-3">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h6 class="mb-0"><i class="bi bi-lightning me-2 text-warning"></i>进行中赛事</h6>
                    <a href="/events" class="btn btn-sm btn-outline-primary">查看全部</a>
                </div>
                <div class="card-body">
                    <div th:if="${ongoingEvents.isEmpty()}" class="text-muted text-center py-3">暂无进行中的赛事</div>
                    <div th:each="event : ${ongoingEvents}" class="d-flex align-items-center mb-3 pb-3 border-bottom">
                        <div class="flex-shrink-0 bg-success bg-opacity-10 rounded-2 p-2 me-3">
                            <i class="bi bi-trophy text-success"></i>
                        </div>
                        <div class="flex-grow-1">
                            <div class="fw-bold" th:text="${event.name}">赛事名称</div>
                            <small class="text-muted" th:text="${event.startDate} + ' ~ ' + ${event.endDate}">日期</small>
                        </div>
                        <span class="badge bg-success">进行中</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h6 class="mb-0"><i class="bi bi-pencil-square me-2 text-primary"></i>报名中赛事</h6>
                    <a href="/events" class="btn btn-sm btn-outline-primary">查看全部</a>
                </div>
                <div class="card-body">
                    <div th:if="${registrationEvents.isEmpty()}" class="text-muted text-center py-3">暂无报名中的赛事</div>
                    <div th:each="event : ${registrationEvents}" class="d-flex align-items-center mb-3 pb-3 border-bottom">
                        <div class="flex-shrink-0 bg-primary bg-opacity-10 rounded-2 p-2 me-3">
                            <i class="bi bi-pencil-square text-primary"></i>
                        </div>
                        <div class="flex-grow-1">
                            <div class="fw-bold" th:text="${event.name}">赛事名称</div>
                            <small class="text-muted" th:text="${event.startDate} + ' ~ ' + ${event.endDate}">日期</small>
                        </div>
                        <span class="badge bg-info">报名中</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts-extra">
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 从script标签读取数据
    var eventStatusData = [];
    var athleteAgeData = [];

    try {
        var esEl = document.getElementById('event-status-data');
        if (esEl && esEl.textContent.trim()) eventStatusData = JSON.parse(esEl.textContent);
    } catch(e) { console.error('赛事状态数据解析错误:', e); }

    try {
        var aaEl = document.getElementById('athlete-age-data');
        if (aaEl && aaEl.textContent.trim()) athleteAgeData = JSON.parse(aaEl.textContent);
    } catch(e) { console.error('年龄段数据解析错误:', e); }

    console.log('赛事状态数据:', eventStatusData);
    console.log('年龄段数据:', athleteAgeData);

    // 赛事状态分布图
    if (eventStatusData && eventStatusData.length > 0) {
        document.getElementById('eventStatusEmpty').style.display = 'none';
        var nameMap = {
            'DRAFT': '草稿', 'REGISTRATION': '报名中', 'ONGOING': '进行中',
            'FINISHED': '已结束', 'CANCELLED': '已取消'
        };
        var labels = eventStatusData.map(function(item) { return nameMap[item[0]] || item[0]; });
        var values = eventStatusData.map(function(item) { return item[1]; });
        var colors = ['#6c757d', '#0dcaf0', '#198754', '#0d6efd', '#dc3545'];

        new Chart(document.getElementById('eventStatusChart'), {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{ data: values, backgroundColor: colors, borderWidth: 2 }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } }
            }
        });
    }

    // 运动员年龄段分布图
    if (athleteAgeData && athleteAgeData.length > 0) {
        document.getElementById('athleteAgeEmpty').style.display = 'none';
        var ageLabels = athleteAgeData.map(function(item) { return item[0]; });
        var ageValues = athleteAgeData.map(function(item) { return item[1]; });

        new Chart(document.getElementById('athleteAgeChart'), {
            type: 'bar',
            data: {
                labels: ageLabels,
                datasets: [{
                    label: '运动员数量',
                    data: ageValues,
                    backgroundColor: '#0d6efd',
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });
    }
});
</script>
</th:block>
</body>
</html>
