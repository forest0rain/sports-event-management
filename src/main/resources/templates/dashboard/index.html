<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title>仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div layout:fragment="content">
        <!-- 欢迎信息 -->
        <div class="alert alert-info alert-dismissible fade show" role="alert">
            <div class="d-flex align-items-center">
                <div>
                    <strong>欢迎回来，<span sec:authentication="name">用户</span>！</strong>
                    <span sec:authorize="hasRole('ADMIN')" class="badge bg-danger ms-2">管理员</span>
                    <span sec:authorize="hasRole('REFEREE')" class="badge bg-warning ms-2">裁判</span>
                    <span sec:authorize="hasRole('ATHLETE')" class="badge bg-success ms-2">运动员</span>
                </div>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- 统计卡片 -->
        <div class="row g-4 mb-4">
            <div class="col-md-6 col-lg-3">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0">
                                <div class="bg-primary bg-gradient rounded-3 p-3">
                                    <i class="bi bi-calendar-event text-white fs-4"></i>
                                </div>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <h6 class="text-muted mb-1">总赛事数</h6>
                                <h3 class="mb-0" th:text="${stats.totalEvents}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0">
                                <div class="bg-success bg-gradient rounded-3 p-3">
                                    <i class="bi bi-person-badge text-white fs-4"></i>
                                </div>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <h6 class="text-muted mb-1">注册运动员</h6>
                                <h3 class="mb-0" th:text="${stats.totalAthletes}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0">
                                <div class="bg-warning bg-gradient rounded-3 p-3">
                                    <i class="bi bi-clock text-white fs-4"></i>
                                </div>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <h6 class="text-muted mb-1">总赛程数</h6>
                                <h3 class="mb-0" th:text="${stats.totalSchedules}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0">
                                <div class="bg-info bg-gradient rounded-3 p-3">
                                    <i class="bi bi-trophy text-white fs-4"></i>
                                </div>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <h6 class="text-muted mb-1">有效成绩数</h6>
                                <h3 class="mb-0" th:text="${stats.totalResults}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="row g-4 mb-4">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0"><i class="bi bi-pie-chart me-2"></i>赛事状态分布</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="eventStatusChart" height="250"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0"><i class="bi bi-bar-chart me-2"></i>运动员年龄段分布</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="athleteAgeChart" height="250"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- 进行中赛事 + 待审核 -->
        <div class="row g-4 mb-4">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-play-circle me-2"></i>进行中赛事</h5>
                        <a th:href="@{/events}" class="btn btn-sm btn-outline-primary">查看全部</a>
                    </div>
                    <div class="card-body p-0">
                        <div class="list-group list-group-flush">
                            <div class="list-group-item" th:each="event : ${ongoingEvents}">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="mb-1" th:text="${event.name}">赛事名称</h6>
                                        <small class="text-muted" th:text="${event.startDate} + ' ~ ' + ${event.endDate}">日期</small>
                                    </div>
                                    <span class="badge bg-success">进行中</span>
                                </div>
                            </div>
                            <div class="list-group-item text-center text-muted" th:if="${ongoingEvents.isEmpty()}">
                                暂无进行中的赛事
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-clipboard-check me-2"></i>待办事项</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="list-group list-group-flush">
                            <div class="list-group-item d-flex justify-content-between align-items-center" sec:authorize="hasAnyRole('ADMIN', 'REFEREE')">
                                <span>待审核报名</span>
                                <span class="badge bg-warning rounded-pill" th:text="${stats.pendingRegistrations}">0</span>
                            </div>
                            <div class="list-group-item d-flex justify-content-between align-items-center" sec:authorize="hasRole('ADMIN')">
                                <span>待审核角色申请</span>
                                <span class="badge bg-danger rounded-pill" th:text="${pendingCount}">0</span>
                            </div>
                            <div class="list-group-item d-flex justify-content-between align-items-center">
                                <span>进行中赛事</span>
                                <span class="badge bg-success rounded-pill" th:text="${stats.ongoingEventsCount}">0</span>
                            </div>
                            <div class="list-group-item d-flex justify-content-between align-items-center">
                                <span>报名中赛事</span>
                                <span class="badge bg-info rounded-pill" th:text="${#lists.size(registrationEvents)}">0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 管理功能快捷入口 -->
        <div class="card border-0 shadow-sm" sec:authorize="hasAnyRole('ADMIN', 'REFEREE')">
            <div class="card-header bg-white">
                <h5 class="mb-0"><i class="bi bi-lightning me-2"></i>管理功能</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-2">
                        <a th:href="@{/events}" class="btn btn-outline-primary w-100 py-3">
                            <i class="bi bi-calendar-event fs-4 d-block mb-2"></i>
                            赛事管理
                        </a>
                    </div>
                    <div class="col-md-2" sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/athletes}" class="btn btn-outline-success w-100 py-3">
                            <i class="bi bi-person-badge fs-4 d-block mb-2"></i>
                            运动员管理
                        </a>
                    </div>
                    <div class="col-md-2" sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/venues}" class="btn btn-outline-secondary w-100 py-3">
                            <i class="bi bi-building fs-4 d-block mb-2"></i>
                            场地管理
                        </a>
                    </div>
                    <div class="col-md-2">
                        <a th:href="@{/schedule-generation}" class="btn btn-success w-100 py-3">
                            <i class="bi bi-magic fs-4 d-block mb-2"></i>
                            智能编排
                        </a>
                    </div>
                    <div class="col-md-2">
                        <a th:href="@{/results}" class="btn btn-outline-info w-100 py-3">
                            <i class="bi bi-graph-up fs-4 d-block mb-2"></i>
                            成绩管理
                        </a>
                    </div>
                    <div class="col-md-2">
                        <a th:href="@{/results/statistics}" class="btn btn-outline-warning w-100 py-3">
                            <i class="bi bi-bar-chart fs-4 d-block mb-2"></i>
                            数据统计
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        // 赛事状态分布图
        const eventStatusData = /*[[${eventStatusData}]]*/ [];
        if (eventStatusData && eventStatusData.length > 0) {
            const statusLabels = eventStatusData.map(item => {
                const nameMap = {
                    'DRAFT': '草稿', 'REGISTRATION': '报名中', 'ONGOING': '进行中',
                    'FINISHED': '已结束', 'CANCELLED': '已取消'
                };
                return nameMap[item.status] || item.status;
            });
            const statusValues = eventStatusData.map(item => item.count);
            const statusColors = ['#6c757d', '#0dcaf0', '#198754', '#0d6efd', '#dc3545'];

            new Chart(document.getElementById('eventStatusChart'), {
                type: 'doughnut',
                data: {
                    labels: statusLabels,
                    datasets: [{
                        data: statusValues,
                        backgroundColor: statusColors,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        // 运动员年龄段分布图
        const athleteAgeData = /*[[${athleteByAgeGroup}]]*/ [];
        if (athleteAgeData && athleteAgeData.length > 0) {
            const ageLabels = athleteAgeData.map(item => item.ageGroup);
            const ageValues = athleteAgeData.map(item => item.count);

            new Chart(document.getElementById('athleteAgeChart'), {
                type: 'bar',
                data: {
                    labels: ageLabels,
                    datasets: [{
                        label: '运动员数量',
                        data: ageValues,
                        backgroundColor: '#0d6efd',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1 } }
                    }
                }
            });
        }
    });
    </script>
</body>
</html>
