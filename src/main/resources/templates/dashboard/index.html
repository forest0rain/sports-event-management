<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/main}">
<head>
    <title>仪表盘 - 体育赛事管理平台</title>
</head>
<body>
<div layout:fragment="content">
    <!-- 图表数据嵌入（合并为一个JSON对象，与统计页面相同的方式） -->
    <script id="chart-data" type="application/json" th:utext="${chartDataJson}">{}</script>

    <!-- 统计卡片 -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0 bg-primary bg-opacity-10 rounded-3 p-3">
                            <i class="bi bi-trophy text-primary fs-4"></i>
                        </div>
                        <div class="flex-grow-1 ms-3">
                            <div class="text-muted small">赛事总数</div>
                            <div class="fs-4 fw-bold" th:text="${stats.totalEvents}">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0 bg-success bg-opacity-10 rounded-3 p-3">
                            <i class="bi bi-people text-success fs-4"></i>
                        </div>
                        <div class="flex-grow-1 ms-3">
                            <div class="text-muted small">运动员总数</div>
                            <div class="fs-4 fw-bold" th:text="${stats.totalAthletes}">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0 bg-warning bg-opacity-10 rounded-3 p-3">
                            <i class="bi bi-clipboard-check text-warning fs-4"></i>
                        </div>
                        <div class="flex-grow-1 ms-3">
                            <div class="text-muted small">待审核报名</div>
                            <div class="fs-4 fw-bold" th:text="${stats.pendingRegistrations}">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0 bg-info bg-opacity-10 rounded-3 p-3">
                            <i class="bi bi-calendar-event text-info fs-4"></i>
                        </div>
                        <div class="flex-grow-1 ms-3">
                            <div class="text-muted small">进行中赛事</div>
                            <div class="fs-4 fw-bold" th:text="${stats.ongoingEventsCount}">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 图表区域 -->
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white">
                    <h6 class="mb-0"><i class="bi bi-pie-chart me-2"></i>赛事状态分布</h6>
                </div>
                <div class="card-body">
                    <canvas id="eventStatusChart" height="250"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white">
                    <h6 class="mb-0"><i class="bi bi-bar-chart me-2"></i>运动员年龄段分布</h6>
                </div>
                <div class="card-body">
                    <canvas id="athleteAgeChart" height="250"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- 进行中赛事 + 报名中赛事 -->
    <div class="row g-3">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h6 class="mb-0"><i class="bi bi-lightning me-2 text-warning"></i>进行中赛事</h6>
                    <a href="/events" class="btn btn-sm btn-outline-primary">查看全部</a>
                </div>
                <div class="card-body">
                    <div th:if="${ongoingEvents.isEmpty()}" class="text-muted text-center py-3">暂无进行中的赛事</div>
                    <div th:each="event : ${ongoingEvents}" class="d-flex align-items-center mb-3 pb-3 border-bottom">
                        <div class="flex-shrink-0 bg-success bg-opacity-10 rounded-2 p-2 me-3">
                            <i class="bi bi-trophy text-success"></i>
                        </div>
                        <div class="flex-grow-1">
                            <div class="fw-bold" th:text="${event.name}">赛事名称</div>
                            <small class="text-muted" th:text="${event.startDate} + ' ~ ' + ${event.endDate}">日期</small>
                        </div>
                        <span class="badge bg-success">进行中</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h6 class="mb-0"><i class="bi bi-pencil-square me-2 text-primary"></i>报名中赛事</h6>
                    <a href="/events" class="btn btn-sm btn-outline-primary">查看全部</a>
                </div>
                <div class="card-body">
                    <div th:if="${registrationEvents.isEmpty()}" class="text-muted text-center py-3">暂无报名中的赛事</div>
                    <div th:each="event : ${registrationEvents}" class="d-flex align-items-center mb-3 pb-3 border-bottom">
                        <div class="flex-shrink-0 bg-primary bg-opacity-10 rounded-2 p-2 me-3">
                            <i class="bi bi-pencil-square text-primary"></i>
                        </div>
                        <div class="flex-grow-1">
                            <div class="fw-bold" th:text="${event.name}">赛事名称</div>
                            <small class="text-muted" th:text="${event.startDate} + ' ~ ' + ${event.endDate}">日期</small>
                        </div>
                        <span class="badge bg-info">报名中</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts-extra">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 读取合并的图表数据
    function getChartData() {
        var el = document.getElementById('chart-data');
        if (!el) { console.warn('chart-data element not found'); return null; }
        var text = el.textContent.trim();
        if (!text || text === '{}') return null;
        try { return JSON.parse(text); }
        catch(e) { console.error('Parse error:', e, text.substring(0, 200)); return null; }
    }

    var chartData = getChartData();
    console.log('Dashboard chartData:', chartData);

    var statusMap = { 'DRAFT':'草稿','REGISTRATION':'报名中','ONGOING':'进行中','FINISHED':'已结束','CANCELLED':'已取消' };

    // 赛事状态分布
    if (chartData && chartData.eventStatus && chartData.eventStatus.length > 0) {
        new Chart(document.getElementById('eventStatusChart'), {
            type: 'doughnut',
            data: {
                labels: chartData.eventStatus.map(function(i){return statusMap[i[0]]||i[0];}),
                datasets: [{
                    data: chartData.eventStatus.map(function(i){return i[1];}),
                    backgroundColor: ['#6c757d','#0dcaf0','#198754','#0d6efd','#dc3545'],
                    borderWidth: 3,
                    borderColor: '#fff',
                    hoverOffset: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '55%',
                plugins: { legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true } } }
            }
        });
    }

    // 运动员年龄段分布
    var ageGroupMap = { 'U18':'少年组(U18)', 'U20':'青年组(U20)', 'U23':'U23组', 'OPEN':'成年组(OPEN)' };
    if (chartData && chartData.athleteAge && chartData.athleteAge.length > 0) {
        new Chart(document.getElementById('athleteAgeChart'), {
            type: 'bar',
            data: {
                labels: chartData.athleteAge.map(function(i){return ageGroupMap[i[0]]||i[0];}),
                datasets: [{
                    label: '运动员数量',
                    data: chartData.athleteAge.map(function(i){return i[1];}),
                    backgroundColor: '#0d6efd',
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });
    }
});
</script>
</th:block>
</body>
</html>
