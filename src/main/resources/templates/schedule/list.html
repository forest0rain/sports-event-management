<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛程列表 - 体育赛事管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="~{fragments/navbar :: navbar(false)}"></div>

    <div class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <span sec:authorize="hasAnyRole('ADMIN', 'REFEREE')">赛程管理</span>
                <span sec:authorize="hasAnyRole('ATHLETE', 'SPECTATOR') and not hasAnyRole('ADMIN', 'REFEREE')">赛程列表</span>
            </h2>
            <!-- 创建按钮 - 仅管理员和裁判可见 -->
            <div sec:authorize="hasAnyRole('ADMIN', 'REFEREE')">
                <a th:href="@{/schedules/create}" class="btn btn-primary">
                    <i class="bi bi-plus-circle me-1"></i>创建赛程
                </a>
            </div>
        </div>

        <!-- 成功/错误消息 -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-circle me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- 权限提示 - 观众和运动员可见 -->
        <div sec:authorize="hasAnyRole('ATHLETE', 'SPECTATOR') and not hasAnyRole('ADMIN', 'REFEREE')" class="alert alert-info">
            <i class="bi bi-info-circle me-2"></i>
            您当前仅有查看权限，如需管理赛程请联系管理员。
        </div>

        <!-- 日期显示 -->
        <div class="alert alert-info">
            <i class="bi bi-calendar-date me-2"></i>
            <span th:text="${#temporals.format(selectedDate, 'yyyy年MM月dd日')}">日期</span> 的比赛安排
        </div>
        
        <!-- 赛程列表 -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>比赛时间</th>
                                <th>赛事名称</th>
                                <th>比赛项目</th>
                                <th>场地</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="schedule : ${schedules}">
                                <td>
                                    <span th:text="${#temporals.format(schedule.date, 'MM-dd')}">日期</span>
                                    <span th:text="${#temporals.format(schedule.startTime, 'HH:mm')} + ' - ' + ${#temporals.format(schedule.endTime, 'HH:mm')}">时间</span>
                                </td>
                                <td>
                                    <a th:href="@{/events/{id}(id=${schedule.event.id})}" 
                                       th:text="${schedule.event.name}">赛事</a>
                                </td>
                                <td th:text="${schedule.sportType != null} ? ${schedule.sportType.name} : '-'">项目</td>
                                <td th:text="${schedule.venue != null} ? ${schedule.venue.name} : '-'">场地</td>
                                <td>
                                    <span th:if="${schedule.status == 'SCHEDULED'}" class="badge bg-secondary">待进行</span>
                                    <span th:if="${schedule.status == 'ONGOING'}" class="badge bg-success">进行中</span>
                                    <span th:if="${schedule.status == 'COMPLETED'}" class="badge bg-info">已完成</span>
                                    <span th:if="${schedule.status == 'CANCELLED'}" class="badge bg-danger">已取消</span>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <!-- 查看按钮 - 所有用户可见 -->
                                        <a th:href="@{/schedules/{id}(id=${schedule.id})}" 
                                           class="btn btn-outline-info" title="详情">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <!-- 编辑按钮 - 仅管理员和裁判可见 -->
                                        <a sec:authorize="hasAnyRole('ADMIN', 'REFEREE')" 
                                           th:href="@{/schedules/{id}/edit(id=${schedule.id})}" 
                                           class="btn btn-outline-primary" title="编辑">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${schedules == null or #lists.isEmpty(schedules)}">
                                <td colspan="6" class="text-center text-muted py-4">
                                    <i class="bi bi-calendar-x" style="font-size: 2rem;"></i>
                                    <p class="mt-2">当日暂无赛程安排</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
