<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title>赛程管理</title>
</head>
<body>
    <div layout:fragment="page-header">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h4">赛程管理</h1>
        </div>
    </div>

    <div layout:fragment="content">
        <!-- 页面内容 -->
        <div class="container-fluid">
            <!-- 搜索筛选 -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <form th:action="@{/schedules}" method="get" class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">赛事</label>
                            <select class="form-select" name="eventId">
                                <option value="">全部赛事</option>
                                <option th:each="event : ${events}" 
                                        th:value="${event.id}" 
                                        th:text="${event.name}"
                                        th:selected="${param.eventId == event.id}">赛事名称</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">场地</label>
                            <select class="form-select" name="venueId">
                                <option value="">全部场地</option>
                                <option th:each="venue : ${venues}" 
                                        th:value="${venue.id}" 
                                        th:text="${venue.name}"
                                        th:selected="${param.venueId == venue.id}">场地名称</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">日期</label>
                            <input type="date" class="form-control" name="date" th:value="${param.date}">
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-search me-1"></i>搜索
                            </button>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <a th:href="@{/schedule-generation}" class="btn btn-success w-100">
                                <i class="bi bi-magic me-1"></i>智能编排
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 统计卡片 -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body text-center">
                            <h6 class="text-muted mb-1">总赛程</h6>
                            <h3 class="mb-0 text-primary" th:text="${schedules.size()}">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body text-center">
                            <h6 class="text-muted mb-1">已编排</h6>
                            <h3 class="mb-0 text-success" th:text="${scheduledCount ?: 0}">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body text-center">
                            <h6 class="text-muted mb-1">待编排</h6>
                            <h3 class="mb-0 text-warning" th:text="${pendingCount ?: 0}">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body text-center">
                            <h6 class="text-muted mb-1">进行中</h6>
                            <h3 class="mb-0 text-info" th:text="${inProgressCount ?: 0}">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 赛程列表 -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-list-ul me-2"></i>赛程列表</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>日期</th>
                                    <th>时间</th>
                                    <th>场地</th>
                                    <th>运动项目</th>
                                    <th>轮次</th>
                                    <th>状态</th>
                                    <th class="text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="schedule : ${schedules}">
                                    <td th:text="${schedule.id}">1</td>
                                    <td th:text="${#temporals.format(schedule.date, 'yyyy-MM-dd')}">2024-01-01</td>
                                    <td>
                                        <span th:text="${schedule.startTime}">09:00</span> - 
                                        <span th:text="${schedule.endTime}">10:00</span>
                                    </td>
                                    <td th:text="${schedule.venue?.name}">主场地</td>
                                    <td th:text="${schedule.sportType?.name}">田径</td>
                                    <td>
                                        <span class="badge bg-secondary" th:text="${schedule.roundType}">预赛</span>
                                    </td>
                                    <td>
                                        <span class="badge"
                                              th:classappend="${schedule.status == 'SCHEDULED' ? 'bg-success' : 
                                                               schedule.status == 'IN_PROGRESS' ? 'bg-primary' : 
                                                               schedule.status == 'COMPLETED' ? 'bg-info' : 'bg-warning'}"
                                              th:text="${schedule.status}">状态</span>
                                    </td>
                                    <td class="text-center">
                                        <a th:href="@{/schedules/{id}(id=${schedule.id})}" class="btn btn-sm btn-outline-primary">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <a th:href="@{/schedules/{id}/edit(id=${schedule.id})}" class="btn btn-sm btn-outline-secondary">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                    </td>
                                </tr>
                                <tr th:if="${schedules.totalElements == 0}">
                                    <td colspan="8" class="text-center text-muted py-4">
                                        <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                                        暂无赛程数据
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
