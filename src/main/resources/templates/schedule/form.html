<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛程表单 - 体育赛事管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/dashboard}">
                <i class="bi bi-trophy me-2"></i>体育赛事管理平台
            </a>
            <div class="navbar-nav me-auto">
                <a class="nav-link text-white" th:href="@{/dashboard}">
                    <i class="bi bi-house-door me-1"></i>主页
                </a>
            </div>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text text-white me-3">
                    欢迎，<span sec:authentication="name">用户</span>
                </span>
                <a class="nav-link text-white" th:href="@{/logout}">
                    <i class="bi bi-box-arrow-right me-1"></i>退出
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 th:text="${schedule.id != null} ? '编辑赛程' : '创建赛程'">创建赛程</h2>
            <a th:href="@{/schedules}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>返回列表
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="${schedule.id != null} ? @{/schedules/{id}/edit(id=${schedule.id})} : @{/schedules/create}" 
                      th:object="${schedule}" method="post">
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">比赛日期 <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" th:field="*{date}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">开始时间 <span class="text-danger">*</span></label>
                            <input type="time" class="form-control" th:field="*{startTime}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">结束时间 <span class="text-danger">*</span></label>
                            <input type="time" class="form-control" th:field="*{endTime}" required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">组别</label>
                            <input type="text" class="form-control" th:field="*{groupName}" placeholder="如：男子组、女子组">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">状态</label>
                            <select class="form-select" th:field="*{status}">
                                <option value="SCHEDULED">待进行</option>
                                <option value="ONGOING">进行中</option>
                                <option value="COMPLETED">已完成</option>
                                <option value="CANCELLED">已取消</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">备注</label>
                        <textarea class="form-control" th:field="*{remark}" rows="3"></textarea>
                    </div>
                    
                    <div class="text-end">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>保存
                        </button>
                        <a th:href="@{/schedules}" class="btn btn-outline-secondary ms-2">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
