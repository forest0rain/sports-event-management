<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}"
      lang="zh-CN">
<head>
    <title>赛程表单 - 体育赛事管理平台</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 th:text="${schedule.id != null} ? '编辑赛程' : '创建赛程'">创建赛程</h2>
            <a th:href="@{/schedules}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>返回列表
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="${schedule.id != null} ? @{/schedules/{id}/edit(id=${schedule.id})} : @{/schedules/create}" 
                      th:object="${schedule}" method="post">
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">比赛日期 <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" th:field="*{date}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">开始时间 <span class="text-danger">*</span></label>
                            <input type="time" class="form-control" th:field="*{startTime}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">结束时间 <span class="text-danger">*</span></label>
                            <input type="time" class="form-control" th:field="*{endTime}" required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">组别</label>
                            <input type="text" class="form-control" th:field="*{groupName}" placeholder="如：男子组、女子组">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">状态</label>
                            <select class="form-select" th:field="*{status}">
                                <option value="SCHEDULED">待进行</option>
                                <option value="ONGOING">进行中</option>
                                <option value="COMPLETED">已完成</option>
                                <option value="CANCELLED">已取消</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">备注</label>
                        <textarea class="form-control" th:field="*{remark}" rows="3"></textarea>
                    </div>
                    
                    <div class="text-end">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>保存
                        </button>
                        <a th:href="@{/schedules}" class="btn btn-outline-secondary ms-2">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
