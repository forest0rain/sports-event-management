<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛程详情 - 体育赛事管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/dashboard}">
                <i class="bi bi-trophy me-2"></i>体育赛事管理平台
            </a>
            <div class="navbar-nav me-auto">
                <a class="nav-link text-white" th:href="@{/dashboard}">
                    <i class="bi bi-house-door me-1"></i>主页
                </a>
            </div>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text text-white me-3">
                    欢迎，<span sec:authentication="name">用户</span>
                </span>
                <a class="nav-link text-white" th:href="@{/logout}">
                    <i class="bi bi-box-arrow-right me-1"></i>退出
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>赛程详情</h2>
            <div>
                <a th:href="@{/schedules}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>返回列表
                </a>
                <a th:href="@{/schedules/{id}/edit(id=${schedule.id})}" class="btn btn-primary">
                    <i class="bi bi-pencil me-1"></i>编辑
                </a>
            </div>
        </div>

        <!-- 基本信息 -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">基本信息</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <table class="table table-borderless">
                            <tr>
                                <td class="text-muted" width="120">所属赛事</td>
                                <td>
                                    <a th:href="@{/events/{id}(id=${schedule.event.id})}" 
                                       th:text="${schedule.event.name}">-</a>
                                </td>
                            </tr>
                            <tr>
                                <td class="text-muted">比赛项目</td>
                                <td th:text="${schedule.sportType != null} ? ${schedule.sportType.name} : '-'">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">比赛日期</td>
                                <td th:text="${#temporals.format(schedule.date, 'yyyy-MM-dd')}">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">比赛时间</td>
                                <td th:text="${#temporals.format(schedule.startTime, 'HH:mm')} + ' - ' + ${#temporals.format(schedule.endTime, 'HH:mm')}">-</td>
                            </tr>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <table class="table table-borderless">
                            <tr>
                                <td class="text-muted" width="120">比赛场地</td>
                                <td th:text="${schedule.venue != null} ? ${schedule.venue.name} : '-'">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">组别</td>
                                <td th:text="${schedule.groupName} ?: '-'">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">状态</td>
                                <td>
                                    <span th:if="${schedule.status == 'SCHEDULED'}" class="badge bg-secondary">待进行</span>
                                    <span th:if="${schedule.status == 'ONGOING'}" class="badge bg-success">进行中</span>
                                    <span th:if="${schedule.status == 'COMPLETED'}" class="badge bg-info">已完成</span>
                                    <span th:if="${schedule.status == 'CANCELLED'}" class="badge bg-danger">已取消</span>
                                </td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 状态更新 -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">状态更新</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/schedules/{id}/status(id=${schedule.id})}" method="post">
                    <div class="row align-items-end">
                        <div class="col-md-4">
                            <label class="form-label">更新状态</label>
                            <select class="form-select" name="status">
                                <option value="SCHEDULED" th:selected="${schedule.status == 'SCHEDULED'}">待进行</option>
                                <option value="ONGOING" th:selected="${schedule.status == 'ONGOING'}">进行中</option>
                                <option value="COMPLETED" th:selected="${schedule.status == 'COMPLETED'}">已完成</option>
                                <option value="CANCELLED" th:selected="${schedule.status == 'CANCELLED'}">已取消</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>更新
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
