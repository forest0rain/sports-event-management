<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<body>
<nav th:fragment="navbar(showStats)"
     class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-semibold" th:href="@{/dashboard}">
            <i class="bi bi-trophy me-2"></i>体育赛事管理平台
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                aria-controls="mainNavbar" aria-expanded="false" aria-label="切换导航">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <div class="navbar-nav me-auto">
                <a class="nav-link text-white" th:href="@{/dashboard}">
                    <i class="bi bi-house-door me-1"></i>主页
                </a>

                <a th:if="${showStats}"
                   class="nav-link text-white"
                   th:href="@{/results/statistics}">
                    <i class="bi bi-bar-chart me-1"></i>数据统计
                </a>
            </div>

            <div class="navbar-nav ms-auto align-items-lg-center">
                <span class="navbar-text text-white me-lg-3 mb-2 mb-lg-0">
                    欢迎，<span sec:authentication="name">用户</span>
                </span>

                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit"
                            class="btn btn-link nav-link text-white p-0 border-0 bg-transparent">
                        <i class="bi bi-box-arrow-right me-1"></i>退出
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
