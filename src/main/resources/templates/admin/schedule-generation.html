<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/fragments :: base(~{::title}, ~{::section})}">
<head>
    <title>智能赛程编排 - 体育赛事管理平台</title>
</head>
<body>
<section th:fragment="content">
    <div class="container-fluid">
        <!-- 页面标题 -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-calendar-check"></i> 智能赛程编排</h2>
        </div>

        <!-- 赛事选择区 -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-trophy"></i> 选择赛事</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <label for="eventSelect" class="form-label">选择要编排的赛事</label>
                        <select class="form-select" id="eventSelect">
                            <option value="">-- 请选择赛事 --</option>
                            <th:block th:each="event : ${events}">
                                <option th:value="${event.id}" th:text="${event.name}"></option>
                            </th:block>
                        </select>
                    </div>
                    <div class="col-md-6 d-flex align-items-end">
                        <button class="btn btn-primary" id="btnLoadSchedules" disabled>
                            <i class="bi bi-search"></i> 加载赛程
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 赛程信息区 -->
        <div id="scheduleSection" style="display: none;">
            <!-- 统计卡片 -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="card bg-primary text-white">
                        <div class="card-body">
                            <h5 class="card-title">总赛程数</h5>
                            <h2 id="totalSchedules">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-success text-white">
                        <div class="card-body">
                            <h5 class="card-title">已编排</h5>
                            <h2 id="scheduledCount">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-warning text-white">
                        <div class="card-body">
                            <h5 class="card-title">待编排</h5>
                            <h2 id="pendingCount">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-info text-white">
                        <div class="card-body">
                            <h5 class="card-title">编排天数</h5>
                            <h2 id="scheduledDays">0</h2>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 算法参数配置 -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-gear"></i> 算法参数配置</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-3">
                            <label class="form-label">初始温度</label>
                            <input type="number" class="form-control" id="initialTemp" value="10000" readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">冷却率</label>
                            <input type="number" class="form-control" id="coolingRate" value="0.9995" step="0.0001" readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">最大迭代次数</label>
                            <input type="number" class="form-control" id="maxIterations" value="10000" readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">最小休息时间(小时)</label>
                            <input type="number" class="form-control" id="minRestHours" value="2" readonly>
                        </div>
                    </div>
                    <div class="alert alert-info mt-3 mb-0">
                        <i class="bi bi-info-circle"></i>
                        <strong>智能编排说明：</strong>系统使用模拟退火算法，综合考虑场地利用率、时间紧凑度、运动员休息时间等因素，自动生成最优赛程安排。
                    </div>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="card mb-4">
                <div class="card-body text-center">
                    <button class="btn btn-success btn-lg" id="btnGenerate">
                        <i class="bi bi-lightning-charge"></i> 一键智能编排
                    </button>
                    <button class="btn btn-outline-secondary ms-2" id="btnRefresh">
                        <i class="bi bi-arrow-clockwise"></i> 刷新数据
                    </button>
                </div>
            </div>

            <!-- 赛程列表 -->
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-list-check"></i> 赛程列表</h5>
                    <span class="badge bg-secondary" id="scheduleCount">0 条记录</span>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover" id="scheduleTable">
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th>运动项目</th>
                                    <th>日期</th>
                                    <th>开始时间</th>
                                    <th>结束时间</th>
                                    <th>场地</th>
                                    <th>轮次</th>
                                    <th>组别</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody id="scheduleTableBody">
                                <!-- 数据通过JS动态加载 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- 加载提示 -->
        <div id="loadingOverlay" class="position-fixed top-50 start-50 translate-middle"
             style="display: none; z-index: 9999;">
            <div class="text-center">
                <div class="spinner-border text-primary" style="width: 4rem; height: 4rem;" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <div class="mt-3 text-primary fw-bold">
                    <span id="loadingText">智能编排中，请稍候...</span>
                </div>
                <div class="mt-2 text-muted">
                    模拟退火算法优化中
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        $(document).ready(function() {
            let currentEventId = null;

            // 选择赛事
            $('#eventSelect').change(function() {
                currentEventId = $(this).val();
                if (currentEventId) {
                    $('#btnLoadSchedules').prop('disabled', false);
                    loadSchedules(currentEventId);
                } else {
                    $('#btnLoadSchedules').prop('disabled', true);
                    $('#scheduleSection').hide();
                }
            });

            // 加载赛程按钮
            $('#btnLoadSchedules').click(function() {
                if (currentEventId) {
                    loadSchedules(currentEventId);
                }
            });

            // 一键编排
            $('#btnGenerate').click(function() {
                if (!currentEventId) {
                    alert('请先选择赛事');
                    return;
                }
                generateSchedule(currentEventId);
            });

            // 刷新数据
            $('#btnRefresh').click(function() {
                if (currentEventId) {
                    loadSchedules(currentEventId);
                }
            });

            // 加载赛程列表
            function loadSchedules(eventId) {
                $.get('/schedule-generation/schedules/' + eventId, function(data) {
                    renderScheduleTable(data);
                    $('#scheduleSection').show();
                }).fail(function() {
                    alert('加载赛程失败');
                });

                // 加载统计信息
                loadStatistics(eventId);
            }

            // 加载统计
            function loadStatistics(eventId) {
                $.get('/schedule-generation/statistics/' + eventId, function(data) {
                    $('#totalSchedules').text(data.totalSchedules || 0);
                    $('#scheduledCount').text(data.scheduledCount || 0);
                    $('#pendingCount').text(data.pendingCount || 0);
                    $('#scheduledDays').text(data.scheduledDays || 0);
                });
            }

            // 渲染表格
            function renderScheduleTable(schedules) {
                const tbody = $('#scheduleTableBody');
                tbody.empty();

                if (schedules.length === 0) {
                    tbody.html('<tr><td colspan="9" class="text-center text-muted">暂无赛程数据</td></tr>');
                    return;
                }

                schedules.forEach((s, index) => {
                    const statusClass = getStatusClass(s.status);
                    const statusText = getStatusText(s.status);
                    const date = s.scheduledDate ? s.scheduledDate : '未排';
                    const startTime = s.startTime ? s.startTime.substring(0, 5) : '--:--';
                    const endTime = s.endTime ? s.endTime.substring(0, 5) : '--:--';

                    const row = `
                        <tr>
                            <td>${index + 1}</td>
                            <td><span class="badge bg-primary">${s.sportTypeName || '未知'}</span></td>
                            <td>${date}</td>
                            <td>${startTime}</td>
                            <td>${endTime}</td>
                            <td>${s.venueName || '未分配'}</td>
                            <td>${s.round || '-'}</td>
                            <td>${s.groupName || '-'}</td>
                            <td><span class="badge ${statusClass}">${statusText}</span></td>
                        </tr>
                    `;
                    tbody.append(row);
                });

                $('#scheduleCount').text(schedules.length + ' 条记录');
            }

            // 执行智能编排
            function generateSchedule(eventId) {
                $('#loadingOverlay').show();
                $('#loadingText').text('智能编排中，请稍候...');

                $.ajax({
                    url: '/schedule-generation/generate/' + eventId,
                    type: 'POST',
                    success: function(result) {
                        $('#loadingOverlay').hide();

                        if (result.success) {
                            Swal.fire({
                                icon: 'success',
                                title: '编排完成',
                                html: `
                                    <p>${result.message}</p>
                                    <p>编排数量: <strong>${result.optimizedCount}</strong> 条</p>
                                    <p>冲突数: <strong>${result.conflicts}</strong></p>
                                    <p>优化得分: <strong>${result.score.toFixed(2)}</strong></p>
                                `,
                                confirmButtonText: '确定'
                            });
                            loadSchedules(eventId);
                        } else {
                            Swal.fire({
                                icon: 'error',
                                title: '编排失败',
                                text: result.message
                            });
                        }
                    },
                    error: function() {
                        $('#loadingOverlay').hide();
                        Swal.fire({
                            icon: 'error',
                            title: '请求失败',
                            text: '编排请求失败，请重试'
                        });
                    }
                });
            }

            // 状态样式
            function getStatusClass(status) {
                switch(status) {
                    case 'SCHEDULED': return 'bg-success';
                    case 'PENDING': return 'bg-warning';
                    case 'IN_PROGRESS': return 'bg-info';
                    case 'COMPLETED': return 'bg-secondary';
                    default: return 'bg-secondary';
                }
            }

            function getStatusText(status) {
                switch(status) {
                    case 'SCHEDULED': return '已编排';
                    case 'PENDING': return '待编排';
                    case 'IN_PROGRESS': return '进行中';
                    case 'COMPLETED': return '已完成';
                    default: return status;
                }
            }
        });
    </script>
</section>
</body>
</html>
