<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title>智能编排</title>
    <style>
        .schedule-table th {
            white-space: nowrap;
            font-size: 0.85rem;
        }
        .schedule-table td {
            vertical-align: middle;
            font-size: 0.85rem;
        }
        .badge-scheduled {
            background-color: #198754;
        }
        .badge-pending {
            background-color: #ffc107;
            color: #000;
        }
    </style>
</head>
<body>
    <div layout:fragment="page-title">智能编排</div>

    <div layout:fragment="content">
        <!-- 页面内容 -->
        <div class="container-fluid">
            <!-- 统计卡片 -->
            <div class="row g-3 mb-4">
                <div class="col-6 col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body text-center">
                            <h6 class="text-muted mb-1">总赛程数</h6>
                            <h3 class="mb-0 text-primary" id="totalSchedules">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body text-center">
                            <h6 class="text-muted mb-1">已编排</h6>
                            <h3 class="mb-0 text-success" id="scheduledCount">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body text-center">
                            <h6 class="text-muted mb-1">待编排</h6>
                            <h3 class="mb-0 text-warning" id="pendingCount">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body text-center">
                            <h6 class="text-muted mb-1">编排天数</h6>
                            <h3 class="mb-0 text-info" id="daysUsed">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 赛事选择和操作按钮 -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">选择赛事</label>
                            <select class="form-select" id="eventSelect">
                                <option value="">-- 请选择赛事 --</option>
                            </select>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-bold">操作</label>
                            <div class="d-flex gap-2 flex-wrap">
                                <button class="btn btn-success" id="btnGenerate" onclick="generateSchedule()">
                                    <i class="bi bi-magic me-1"></i>一键智能编排
                                </button>
                                <button class="btn btn-warning" onclick="resetSchedule()">
                                    <i class="bi bi-arrow-repeat me-1"></i>重置赛程
                                </button>
                                <button class="btn btn-outline-secondary" onclick="loadSchedules()">
                                    <i class="bi bi-arrow-clockwise me-1"></i>刷新数据
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 赛程列表 -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-list-ul me-2"></i>赛程列表</h5>
                    <span class="badge bg-secondary" id="scheduleCount">0条记录</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 schedule-table">
                            <thead class="table-light">
                                <tr>
                                    <th class="text-center">序号</th>
                                    <th>日期</th>
                                    <th>开始时间</th>
                                    <th>结束时间</th>
                                    <th>场地</th>
                                    <th>项目</th>
                                    <th>轮次</th>
                                    <th class="text-center">状态</th>
                                </tr>
                            </thead>
                            <tbody id="scheduleTableBody">
                                <tr>
                                    <td colspan="8" class="text-center text-muted py-4">
                                        <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                                        暂无赛程数据
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载中模态框 -->
    <div class="modal fade" id="loadingModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center">
                <div class="modal-body py-5">
                    <div class="spinner-border text-primary mb-3" role="status"></div>
                    <p class="mb-0">智能编排中，请稍候...</p>
                    <small class="text-muted">模拟退火算法优化中</small>
                </div>
            </div>
        </div>
    </div>

    <!-- 结果模态框 -->
    <div class="modal fade" id="resultModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="resultModalTitle">提示</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center py-4">
                    <i class="bi bi-check-circle-fill text-success fs-1 d-block mb-3" id="resultIcon"></i>
                    <p id="resultMessage" class="mb-0"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">确定</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 确认模态框 -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">确认操作</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center py-4">
                    <i class="bi bi-exclamation-triangle-fill text-warning fs-1 d-block mb-3"></i>
                    <p id="confirmMessage" class="mb-0"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" id="confirmBtn">确认</button>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts-extra">
    <script>
    let loadingModal, resultModal, confirmModal;
    let csrfToken = document.querySelector('meta[name="_csrf"]')?.content || document.querySelector('input[name="_csrf"]')?.value;

    document.addEventListener('DOMContentLoaded', function() {
        loadingModal = new bootstrap.Modal(document.getElementById('loadingModal'));
        resultModal = new bootstrap.Modal(document.getElementById('resultModal'));
        confirmModal = new bootstrap.Modal(document.getElementById('confirmModal'));

        loadEvents();

        document.getElementById('eventSelect').addEventListener('change', function() {
            if (this.value) {
                loadSchedules();
                loadStatistics();
            } else {
                document.getElementById('scheduleTableBody').innerHTML = `
                    <tr><td colspan="8" class="text-center text-muted py-4">
                        <i class="bi bi-inbox fs-4 d-block mb-2"></i>请先选择赛事
                    </td></tr>`;
                document.getElementById('scheduleCount').textContent = '0条记录';
                resetStatistics();
            }
        });
    });

    function loadEvents() {
        fetch('/api/events')
            .then(response => response.json())
            .then(data => {
                const select = document.getElementById('eventSelect');
                if (data.length > 0) {
                    select.value = data[0].id;
                    loadSchedules();
                    loadStatistics();
                }
            })
            .catch(error => {
                console.error('加载赛事失败:', error);
                showResult('error', '加载赛事失败，请重试');
            });
    }

    function loadSchedules() {
        const eventId = document.getElementById('eventSelect').value;
        if (!eventId) return;

        fetch(`/api/schedule-generation/schedules?eventId=${eventId}`)
            .then(response => {
                if (!response.ok) throw new Error('加载失败');
                return response.json();
            })
            .then(data => {
                renderScheduleTable(data);
            })
            .catch(error => {
                console.error('加载赛程失败:', error);
                document.getElementById('scheduleTableBody').innerHTML = `
                    <tr><td colspan="8" class="text-center text-danger py-4">
                        <i class="bi bi-exclamation-circle fs-4 d-block mb-2"></i>加载失败，请检查控制台
                    </td></tr>`;
            });
    }

    function loadStatistics() {
        const eventId = document.getElementById('eventSelect').value;
        if (!eventId) return;

        fetch(`/api/schedule-generation/statistics?eventId=${eventId}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById('totalSchedules').textContent = data.total || 0;
                document.getElementById('scheduledCount').textContent = data.scheduled || 0;
                document.getElementById('pendingCount').textContent = data.pending || 0;
                document.getElementById('daysUsed').textContent = data.daysUsed || 0;
            })
            .catch(error => {
                console.error('加载统计失败:', error);
            });
    }

    function resetStatistics() {
        document.getElementById('totalSchedules').textContent = '0';
        document.getElementById('scheduledCount').textContent = '0';
        document.getElementById('pendingCount').textContent = '0';
        document.getElementById('daysUsed').textContent = '0';
    }

    function renderScheduleTable(schedules) {
        const tbody = document.getElementById('scheduleTableBody');
        const count = document.getElementById('scheduleCount');

        if (!schedules || schedules.length === 0) {
            tbody.innerHTML = `
                <tr><td colspan="8" class="text-center text-muted py-4">
                    <i class="bi bi-inbox fs-4 d-block mb-2"></i>暂无赛程数据
                </td></tr>`;
            count.textContent = '0条记录';
            return;
        }

        count.textContent = schedules.length + '条记录';
        tbody.innerHTML = schedules.map((s, i) => `
            <tr>
                <td class="text-center">${i + 1}</td>
                <td>${s.date || '-'}</td>
                <td>${s.startTime ? s.startTime.substring(0, 5) : '-'}</td>
                <td>${s.endTime ? s.endTime.substring(0, 5) : '-'}</td>
                <td>${s.venueName || '-'}</td>
                <td>${s.sportTypeName || '-'}</td>
                <td><span class="badge bg-secondary">${s.roundType || '-'}</span></td>
                <td class="text-center">
                    <span class="badge ${s.status === 'SCHEDULED' ? 'badge-scheduled' : 'badge-pending'}">
                        ${s.status === 'SCHEDULED' ? '已编排' : '待编排'}
                    </span>
                </td>
            </tr>
        `).join('');
    }

    function generateSchedule() {
        const eventId = document.getElementById('eventSelect').value;
        if (!eventId) {
            showResult('error', '请先选择赛事');
            return;
        }

        loadingModal.show();
        fetch('/api/schedule-generation/generate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-TOKEN': csrfToken
            },
            body: JSON.stringify({ eventId: parseInt(eventId) })
        })
        .then(response => response.json())
        .then(data => {
            loadingModal.hide();
            if (data.success) {
                showResult('success', data.message);
                loadSchedules();
                loadStatistics();
            } else {
                showResult('error', data.message);
            }
        })
        .catch(error => {
            loadingModal.hide();
            console.error('编排失败:', error);
            showResult('error', '编排失败，请重试');
        });
    }

    function resetSchedule() {
        const eventId = document.getElementById('eventSelect').value;
        if (!eventId) {
            showResult('error', '请先选择赛事');
            return;
        }

        document.getElementById('confirmMessage').textContent = '确定要重置所有已编排的赛程吗？';
        document.getElementById('confirmBtn').onclick = function() {
            confirmModal.hide();
            fetch(`/api/schedule-generation/reset/${eventId}`, {
                method: 'POST',
                headers: {
                    'X-CSRF-TOKEN': csrfToken
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showResult('success', '重置成功');
                    loadSchedules();
                    loadStatistics();
                } else {
                    showResult('error', data.message);
                }
            })
            .catch(error => {
                console.error('重置失败:', error);
                showResult('error', '重置失败，请重试');
            });
        };
        confirmModal.show();
    }

    function showResult(type, message) {
        const icon = document.getElementById('resultIcon');
        const title = document.getElementById('resultModalTitle');
        const msg = document.getElementById('resultMessage');

        if (type === 'success') {
            icon.className = 'bi bi-check-circle-fill text-success fs-1 d-block mb-3';
            title.textContent = '操作成功';
        } else {
            icon.className = 'bi bi-x-circle-fill text-danger fs-1 d-block mb-3';
            title.textContent = '请求失败';
        }
        msg.textContent = message;
        resultModal.show();
    }
    </script>
    </th:block>
</body>
</html>
