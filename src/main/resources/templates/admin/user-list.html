<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title>用户管理</title>
</head>
<body>
    <div layout:fragment="page-title">用户管理</div>

    <div layout:fragment="content">
        <!-- 页面内容 -->
        <div class="container-fluid">
            <!-- 搜索筛选 -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <form th:action="@{/admin/users}" method="get" class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">用户名</label>
                            <input type="text" class="form-control" name="username" th:value="${param.username}" placeholder="输入用户名">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">角色</label>
                            <select class="form-select" name="role">
                                <option value="">全部</option>
                                <option value="ADMIN" th:selected="${param.role == 'ADMIN'}">管理员</option>
                                <option value="REFEREE" th:selected="${param.role == 'REFEREE'}">裁判</option>
                                <option value="ATHLETE" th:selected="${param.role == 'ATHLETE'}">运动员</option>
                                <option value="SPECTATOR" th:selected="${param.role == 'SPECTATOR'}">观众</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">状态</label>
                            <select class="form-select" name="enabled">
                                <option value="">全部</option>
                                <option value="true" th:selected="${param.enabled == 'true'}">启用</option>
                                <option value="false" th:selected="${param.enabled == 'false'}">禁用</option>
                            </select>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-search me-1"></i>搜索
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">共 <span th:text="${users.totalElements}">0</span> 名用户</h5>
                <a th:href="@{/admin/users/new}" class="btn btn-primary">
                    <i class="bi bi-person-plus me-1"></i>添加用户
                </a>
            </div>

            <!-- 用户列表 -->
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>用户名</th>
                                    <th>邮箱</th>
                                    <th>角色</th>
                                    <th>状态</th>
                                    <th>注册时间</th>
                                    <th class="text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user : ${users}">
                                    <td th:text="${user.id}">1</td>
                                    <td th:text="${user.username}">用户名</td>
                                    <td th:text="${user.email}">email@example.com</td>
                                    <td>
                                        <th:block th:each="role, iter : ${user.roles}">
                                            <span class="badge"
                                                  th:classappend="${role.name == 'ROLE_ADMIN' ? 'bg-danger' : 
                                                                   role.name == 'ROLE_REFEREE' ? 'bg-warning text-dark' : 
                                                                   role.name == 'ROLE_ATHLETE' ? 'bg-success' : 'bg-secondary'}"
                                                  th:text="${#strings.replace(role.name, 'ROLE_', '')}">角色</span>
                                        </th:block>
                                    </td>
                                    <td>
                                        <span class="badge" th:classappend="${user.enabled ? 'bg-success' : 'bg-secondary'}"
                                              th:text="${user.enabled ? '启用' : '禁用'}">状态</span>
                                    </td>
                                    <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                                    <td class="text-center">
                                        <a th:href="@{/admin/users/{id}(id=${user.id})}" class="btn btn-sm btn-outline-primary">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="btn btn-sm btn-outline-secondary">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(users)}">
                                    <td colspan="7" class="text-center text-muted py-4">
                                        <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                                        暂无用户数据
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
