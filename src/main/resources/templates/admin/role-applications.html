<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN"
      layout:decorate="~{layout/main}">
<head>
    <title>角色审核</title>
</head>
<body>
    <div layout:fragment="page-header">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h4">角色审核</h1>
        </div>
    </div>

    <div layout:fragment="content">
        <!-- 页面内容 -->
        <div class="container-fluid">
            <!-- 提示消息 -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <i class="bi bi-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- 待审核数量 -->
            <div class="alert alert-warning mb-4">
                <i class="bi bi-clock me-2"></i>
                待审核申请: <strong th:text="${pendingCount}">0</strong> 条
            </div>

            <!-- 筛选标签 -->
            <ul class="nav nav-tabs mb-4">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${status == 'PENDING'} ? 'active'" 
                       th:href="@{/admin/role-applications(status='PENDING')}">待审核</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${status == 'ALL'} ? 'active'" 
                       th:href="@{/admin/role-applications(status='ALL')}">全部申请</a>
                </li>
            </ul>

            <!-- 申请列表 -->
            <div class="card">
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(applications.content)}" class="text-center text-muted py-4">
                        <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                        <p class="mt-2">暂无申请数据</p>
                    </div>
                    <div th:unless="${#lists.isEmpty(applications.content)}" class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>申请人</th>
                                    <th>申请角色</th>
                                    <th>联系电话</th>
                                    <th>申请理由</th>
                                    <th>申请时间</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="app : ${applications.content}">
                                    <td>
                                        <strong th:text="${app.user.realName}">姓名</strong>
                                        <br>
                                        <small class="text-muted" th:text="${app.user.username}">用户名</small>
                                    </td>
                                    <td>
                                        <span th:if="${app.requestedRole == 'ROLE_ATHLETE'}" class="badge bg-success">运动员</span>
                                        <span th:if="${app.requestedRole == 'ROLE_REFEREE'}" class="badge bg-warning">裁判</span>
                                    </td>
                                    <td th:text="${app.contactPhone}">电话</td>
                                    <td>
                                        <span th:text="${#strings.abbreviate(app.reason, 30)}" 
                                              th:title="${app.reason}">理由</span>
                                    </td>
                                    <td th:text="${#temporals.format(app.createdTime, 'yyyy-MM-dd HH:mm')}">时间</td>
                                    <td>
                                        <span th:if="${app.status == 'PENDING'}" class="badge bg-warning">待审核</span>
                                        <span th:if="${app.status == 'APPROVED'}" class="badge bg-success">已通过</span>
                                        <span th:if="${app.status == 'REJECTED'}" class="badge bg-danger">已拒绝</span>
                                    </td>
                                    <td>
                                        <a th:href="@{/admin/role-applications/{id}(id=${app.id})}" 
                                           class="btn btn-outline-primary btn-sm me-1">
                                            <i class="bi bi-eye"></i> 详情
                                        </a>
                                        <div th:if="${app.status == 'PENDING'}" class="btn-group btn-group-sm d-inline-flex">
                                            <button type="button" class="btn btn-outline-success" 
                                                    data-bs-toggle="modal" 
                                                    data-bs-target="#approveModal"
                                                    th:data-id="${app.id}"
                                                    th:data-name="${app.user.realName}"
                                                    onclick="setApproveData(this)">
                                                <i class="bi bi-check-lg"></i>
                                            </button>
                                            <button type="button" class="btn btn-outline-danger"
                                                    data-bs-toggle="modal" 
                                                    data-bs-target="#rejectModal"
                                                    th:data-id="${app.id}"
                                                    th:data-name="${app.user.realName}"
                                                    onclick="setRejectData(this)">
                                                <i class="bi bi-x-lg"></i>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- 分页 -->
                    <div th:if="${applications.totalPages > 1}" class="d-flex justify-content-center mt-3">
                        <nav>
                            <ul class="pagination">
                                <li class="page-item" th:classappend="${applications.first} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/role-applications(page=${applications.number - 1}, status=${status})}">上一页</a>
                                </li>
                                <li class="page-item disabled">
                                    <span class="page-link">第 <span th:text="${applications.number + 1}">1</span> / <span th:text="${applications.totalPages}">1</span> 页</span>
                                </li>
                                <li class="page-item" th:classappend="${applications.last} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/role-applications(page=${applications.number + 1}, status=${status})}">下一页</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>

        <!-- 通过确认弹窗 -->
        <div class="modal fade" id="approveModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">确认通过申请</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form th:action="@{/admin/role-applications/{id}/approve(id=1)}" method="post" id="approveForm">
                        <div class="modal-body">
                            <p>确认通过 <strong id="approveName"></strong> 的角色申请？</p>
                            <div class="mb-3">
                                <label class="form-label">审核意见（可选）</label>
                                <textarea class="form-control" name="comment" rows="2" placeholder="填写审核意见"></textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                            <button type="submit" class="btn btn-success">确认通过</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- 拒绝确认弹窗 -->
        <div class="modal fade" id="rejectModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">确认拒绝申请</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form th:action="@{/admin/role-applications/{id}/reject(id=1)}" method="post" id="rejectForm">
                        <div class="modal-body">
                            <p>确认拒绝 <strong id="rejectName"></strong> 的角色申请？</p>
                            <div class="mb-3">
                                <label class="form-label">拒绝原因</label>
                                <textarea class="form-control" name="comment" rows="2" placeholder="请填写拒绝原因" required></textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                            <button type="submit" class="btn btn-danger">确认拒绝</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts-extra">
    <script>
        function setApproveData(btn) {
            const id = btn.getAttribute('data-id');
            const name = btn.getAttribute('data-name');
            document.getElementById('approveName').textContent = name;
            document.getElementById('approveForm').action = '/admin/role-applications/' + id + '/approve';
        }

        function setRejectData(btn) {
            const id = btn.getAttribute('data-id');
            const name = btn.getAttribute('data-name');
            document.getElementById('rejectName').textContent = name;
            document.getElementById('rejectForm').action = '/admin/role-applications/' + id + '/reject';
        }
    </script>
    </th:block>
</body>
</html>
