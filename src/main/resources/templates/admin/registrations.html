<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报名审核 - 体育赛事管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">
            <i class="bi bi-trophy me-2"></i>体育赛事管理平台
        </a>
        <div class="navbar-nav me-auto">
            <a class="nav-link" th:href="@{/dashboard}">
                <i class="bi bi-house-door me-1"></i>首页
            </a>
            <a class="nav-link" th:href="@{/events}">
                <i class="bi bi-calendar-event me-1"></i>赛事管理
            </a>
            <a class="nav-link" th:href="@{/admin/registrations}">
                <i class="bi bi-clipboard-check me-1"></i>报名审核
            </a>
        </div>
        <div class="navbar-nav ms-auto">
            <span class="navbar-text text-white me-3">
                欢迎, <span sec:authentication="name">用户</span>
            </span>
            <a class="nav-link text-white" th:href="@{/logout}">
                <i class="bi bi-box-arrow-right me-1"></i>退出
            </a>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4">
    <!-- 提示消息 -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 页面标题 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-clipboard-check me-2"></i>报名审核管理</h2>
    </div>

    <!-- 筛选条件 -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/admin/registrations}" method="get" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">赛事</label>
                    <select name="eventId" class="form-select">
                        <option value="">全部赛事</option>
                        <option th:each="e : ${events}" 
                                th:value="${e.id}" 
                                th:text="${e.name}"
                                th:selected="${eventId != null and eventId == e.id}">赛事名称</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">状态</label>
                    <select name="status" class="form-select">
                        <option value="">全部状态</option>
                        <option th:each="s : ${statusList}" 
                                th:value="${s}" 
                                th:text="${s == 'PENDING' ? '待审核' : s == 'APPROVED' ? '已通过' : s == 'REJECTED' ? '已拒绝' : '已取消'}"
                                th:selected="${status != null and status == s}">状态</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary me-2">
                        <i class="bi bi-search me-1"></i>查询
                    </button>
                    <a th:href="@{/admin/registrations}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-counterclockwise me-1"></i>重置
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- 报名列表 -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">报名列表</h5>
            <div>
                <button type="button" class="btn btn-success btn-sm" onclick="batchApprove()">
                    <i class="bi bi-check-all me-1"></i>批量通过
                </button>
                <button type="button" class="btn btn-danger btn-sm" onclick="showBatchRejectModal()">
                    <i class="bi bi-x-all me-1"></i>批量拒绝
                </button>
            </div>
        </div>
        <div class="card-body">
            <div th:if="${registrations.isEmpty()}" class="text-center py-5">
                <i class="bi bi-inbox fs-1 text-muted"></i>
                <p class="text-muted mt-3">暂无报名记录</p>
            </div>

            <form id="batchForm" method="post">
                <table th:if="${not registrations.isEmpty()}" class="table table-hover">
                    <thead>
                        <tr>
                            <th>
                                <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)">
                            </th>
                            <th>赛事名称</th>
                            <th>参赛项目</th>
                            <th>报名人</th>
                            <th>联系方式</th>
                            <th>单位/班级</th>
                            <th>参赛号码</th>
                            <th>状态</th>
                            <th>报名时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="reg : ${registrations}">
                            <td>
                                <input type="checkbox" name="ids" th:value="${reg.id}" 
                                       th:if="${reg.status == 'PENDING'}">
                            </td>
                            <td>
                                <a th:href="@{/events/{id}(id=${reg.event.id})}" 
                                   th:text="${reg.event.name}">赛事名称</a>
                            </td>
                            <td th:text="${reg.sportType.name}">项目名称</td>
                            <td th:text="${reg.registrantName}">姓名</td>
                            <td th:text="${reg.registrantPhone}">电话</td>
                            <td th:text="${reg.registrantOrg ?: '-'}">单位</td>
                            <td>
                                <span th:if="${reg.bibNumber}" class="badge bg-secondary" 
                                      th:text="${reg.bibNumber}">号码</span>
                                <span th:unless="${reg.bibNumber}" class="text-muted">-</span>
                            </td>
                            <td>
                                <span th:if="${reg.status == 'PENDING'}" class="badge bg-warning text-dark">
                                    <i class="bi bi-clock me-1"></i>待审核
                                </span>
                                <span th:if="${reg.status == 'APPROVED'}" class="badge bg-success">
                                    <i class="bi bi-check-circle me-1"></i>已通过
                                </span>
                                <span th:if="${reg.status == 'REJECTED'}" class="badge bg-danger">
                                    <i class="bi bi-x-circle me-1"></i>已拒绝
                                </span>
                                <span th:if="${reg.status == 'CANCELLED'}" class="badge bg-secondary">
                                    <i class="bi bi-ban me-1"></i>已取消
                                </span>
                            </td>
                            <td th:text="${#temporals.format(reg.createdTime, 'yyyy-MM-dd HH:mm')}">时间</td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <button th:if="${reg.status == 'PENDING'}" 
                                            type="button"
                                            class="btn btn-success"
                                            th:onclick="'approve(' + ${reg.id} + ')'">
                                        <i class="bi bi-check"></i>
                                    </button>
                                    <button th:if="${reg.status == 'PENDING'}" 
                                            type="button"
                                            class="btn btn-danger"
                                            th:onclick="'showRejectModal(' + ${reg.id} + ')'">
                                        <i class="bi bi-x"></i>
                                    </button>
                                    <a th:href="@{/events/{id}(id=${reg.event.id})}" 
                                       class="btn btn-outline-primary">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </form>

            <!-- 分页 -->
            <div th:if="${registrations.totalPages > 1}" class="d-flex justify-content-center mt-4">
                <nav>
                    <ul class="pagination">
                        <li class="page-item" th:classappend="${registrations.first} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/admin/registrations(page=${registrations.number - 1}, eventId=${eventId}, status=${status})}">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, registrations.totalPages - 1)}"
                            th:classappend="${i == registrations.number} ? 'active' : ''">
                            <a class="page-link" th:href="@{/admin/registrations(page=${i}, eventId=${eventId}, status=${status})}"
                               th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${registrations.last} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/admin/registrations(page=${registrations.number + 1}, eventId=${eventId}, status=${status})}">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<!-- 单个审核通过表单 -->
<form id="approveForm" method="post" style="display: none;">
</form>

<!-- 单个拒绝表单 -->
<form id="rejectForm" method="post" style="display: none;">
    <input type="hidden" name="reason" id="rejectReason">
</form>

<!-- 批量拒绝模态框 -->
<div class="modal fade" id="batchRejectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">批量拒绝报名</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">拒绝原因</label>
                    <textarea id="batchRejectReason" class="form-control" rows="3" 
                             placeholder="请输入拒绝原因"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" onclick="batchReject()">确认拒绝</button>
            </div>
        </div>
    </div>
</div>

<!-- JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    var batchRejectModal;

    document.addEventListener('DOMContentLoaded', function() {
        batchRejectModal = new bootstrap.Modal(document.getElementById('batchRejectModal'));
    });

    function approve(id) {
        if (confirm('确定要通过该报名吗？')) {
            var form = document.getElementById('approveForm');
            form.action = '/admin/registrations/' + id + '/approve';
            form.submit();
        }
    }

    function showRejectModal(id) {
        var reason = prompt('请输入拒绝原因：');
        if (reason !== null && reason !== '') {
            var form = document.getElementById('rejectForm');
            document.getElementById('rejectReason').value = reason;
            form.action = '/admin/registrations/' + id + '/reject';
            form.submit();
        }
    }

    function toggleSelectAll(source) {
        var checkboxes = document.getElementsByName('ids');
        for (var i = 0; i < checkboxes.length; i++) {
            checkboxes[i].checked = source.checked;
        }
    }

    function batchApprove() {
        var ids = getSelectedIds();
        if (ids.length === 0) {
            alert('请先选择要通过的报名记录');
            return;
        }
        if (confirm('确定要通过选中的 ' + ids.length + ' 条报名记录吗？')) {
            var form = document.getElementById('batchForm');
            form.action = '/admin/registrations/batch-approve';
            form.submit();
        }
    }

    function showBatchRejectModal() {
        var ids = getSelectedIds();
        if (ids.length === 0) {
            alert('请先选择要拒绝的报名记录');
            return;
        }
        batchRejectModal.show();
    }

    function batchReject() {
        var reason = document.getElementById('batchRejectReason').value;
        if (!reason) {
            alert('请输入拒绝原因');
            return;
        }
        var form = document.getElementById('batchForm');
        // 添加reason参数
        var reasonInput = document.createElement('input');
        reasonInput.type = 'hidden';
        reasonInput.name = 'reason';
        reasonInput.value = reason;
        form.appendChild(reasonInput);
        
        form.action = '/admin/registrations/batch-reject';
        form.submit();
    }

    function getSelectedIds() {
        var ids = [];
        var checkboxes = document.getElementsByName('ids');
        for (var i = 0; i < checkboxes.length; i++) {
            if (checkboxes[i].checked) {
                ids.push(checkboxes[i].value);
            }
        }
        return ids;
    }
</script>
</body>
</html>
